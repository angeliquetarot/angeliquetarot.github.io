<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angelique Tarot (CSV版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
  --bg: #0c0c18;
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.72);
  --accent: #f0abfc;
  --accent2: #a5b4fc;
  --warn: #fde68a;
}

/* base */
*{ box-sizing:border-box; }
html{ font-size: 18px; }
body{
  margin:0;
  min-height:100vh;
  color: var(--text);
  font-family:"Shippori Mincho", serif;
  padding-inline: 16px;
  background:
    radial-gradient(120% 100% at 50% 0%, rgba(249,224,138,.10), rgba(0,0,0,0) 60%),
    radial-gradient(90% 80% at 85% 18%, rgba(165,180,252,.10), rgba(0,0,0,0) 62%),
    linear-gradient(to bottom, #11111d 0%, #15152b 60%, #0c0c18 100%);
}
h1,h2,.shareTitle,.summaryTitle{
  font-family:"Cinzel","Shippori Mincho",serif;
  letter-spacing:.04em;
}

.app{ width:min(1100px,100%); margin-inline:auto; }

/* panels */
.panel,.stage,.summaryCard{
  background: rgba(20,16,30,.62);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 22px 64px rgba(0,0,0,.55),
              inset 0 0 0 1px rgba(255,255,255,.10);
  color: rgba(255,255,255,.92);
}

/* chips/buttons */
.chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  padding: 10px 12px;
  border-radius: 999px;
  cursor:pointer;
}
.chip span{ color: var(--muted); }

button{
  border:0;
  cursor:pointer;
  padding:12px 14px;
  border-radius:14px;
  color: rgba(40,28,10,.92);
  background: linear-gradient(135deg,#f6e7c6 0%,#efd39a 28%,#d7b36a 55%,#f3e0b8 100%);
  font-weight:900;
  letter-spacing:.06em;
}

/* draw bar */
.drawBar{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:14px 0 10px;
  position:relative;
  z-index:50;
}
.drawModeInline{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
#btnDraw{ display:inline-flex; z-index:60; }

/* card layout */
.cardsGrid{
  width: min(1100px, 100%);
  margin: 18px auto 0;
  padding-inline: 8px;
  display: grid;
  gap: 14px;
  align-items: start;
}
.cardsGrid.single{
  grid-template-columns: minmax(0, 420px);
  justify-content: center;
}
.cardsGrid.three{
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.cardsGrid.three > .tcard{ min-width:0; }

@media (max-width: 980px){
  .cardsGrid.three{ grid-template-columns: repeat(2, minmax(0,1fr)); }
}
@media (max-width: 640px){
  .cardsGrid.three{ grid-template-columns: 1fr; }
}

.tcard{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.10);
  overflow:hidden;
}

.tcardHeader{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding: 12px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.18);
}
.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
  white-space:nowrap;
}
.badge.up{ border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.12); }
.badge.rev{ border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.12); }

.tcardVisual{ padding: 10px; }
.cardImg{
  display:block;
  width:100%;
  height:auto;
  max-width:100%;
  border-radius: 16px;
  object-fit: cover;
}
.cardImg.reversed{ transform: rotate(180deg); }

.tcardBody{
  padding: 0 12px 12px;
  color: rgba(255,255,255,.90);
  font-size: 13px;
  line-height: 1.7;
}

/* mobile containment */
@media (max-width: 520px){
  .tcardHeader{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
    padding: 10px 10px 8px;
  }
  .badge{ font-size: 11px; padding: 5px 8px; white-space: normal; }
}
/* =========================
   🂠 Card Back (simple + reliable)
   - 既存 .tcard / .tcardVisual を壊さず背面を出す
   ========================= */

.tcardVisual{
  position: relative; /* 必須 */
}

/* 背面画像（最背面に敷く） */
.cardBack{
  position: absolute;
  inset: 10px;                 /* 角飾り背景と合わせる */
  border-radius: 16px;
  background:
    radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,.10), rgba(0,0,0,0) 55%),
    radial-gradient(120% 120% at 70% 80%, rgba(249,224,138,.10), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.25)),
    url("public/cards/back.webp") center / cover no-repeat; /* ←ここをあなたの背面に */
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 18px 46px rgba(0,0,0,.42);
  z-index: 0;
  pointer-events: none;
}

/* 表の画像は背面より前に */
.tcardVisual .cardImg{
  position: relative;
  z-index: 1;
}

/* 画像が無い/未読込のときだけ背面を見せる */
.cardImg.isHidden{
  opacity: 0;
}

.tcardVisual{ position:relative; }

.cardBackImg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
  z-index:0;
}

.cardImg{
  position:relative;
  z-index:1;
  width:100%;
  height:auto;
  border-radius:16px;
}
  </style>
</head>

<body>
  <div id="versionBadge" style="position:fixed;bottom:12px;right:12px;z-index:9999;
background:#000a;border:1px solid #fff3;color:#fff;padding:8px 10px;border-radius:10px;
font:12px/1.2 ui-sans-serif;">
    VERSION:
  </div>

  <!-- Toast（showToastが探すので必須） -->
  <div id="toastContainer" aria-live="polite"></div>

  <div class="app">
    <!-- ヘッダー -->
    <header class="appHeader">
      <div class="title">
        <h1>Angelique Tarot</h1>
        <p>光の導きで、心をほどく。</p>
      </div>
    </header>

    <!-- 生年月日入力（JSが読むidで） -->
<section class="panel birthPanel" id="birthPanel">
  <h2 class="panelTitle">生年月日</h2>

  <div class="birthGrid">
    <!-- あなた：生年月日 -->
    <div class="birthBlock">
      <label class="birthLabel" for="userBirthdate">あなた</label>
      <input type="date" id="userBirthdate" class="birthInput" />
    </div>

    <!-- あなた：出生時刻（任意） -->
    <div class="birthBlock">

      <input id="userBirthtime" class="birthInput" type="time" step="60" />
    </div>

    <!-- お相手：生年月日 -->
    <div class="birthBlock">
      <label class="birthLabel" for="partnerBirthdate">お相手（任意）</label>
      <input type="date" id="partnerBirthdate" class="birthInput" />
    </div>

    <!-- お相手：出生時刻（任意） -->
    <div class="birthBlock">
      <label class="birthLabel" for="partnerBirthtime">お相手（任意：出生時刻）</label>
      <input id="partnerBirthtime" class="birthInput" type="time" step="60" />
    </div>
  </div>

  <p class="birthHint">
    ※ 任意：時刻まで入れると、五行（木火土金水）がよりパーソナルに整います。
  </p>
  <p class="birthHint">
    ※ 生年月日を入れると、読み解きがよりパーソナルになります
  </p>
</section>

    <div class="divider"></div>

    <!-- ステータス（JSが参照するid） -->
    <div id="status" class="status" aria-live="polite"></div>
    <div id="deckInfo" class="status"></div>

    <!-- シャッフル -->
    <div id="shuffleArea" class="shuffleArea">
      <div class="deck" aria-hidden="true"></div>
      <div class="fly" aria-hidden="true"></div>
      <div class="fly" aria-hidden="true"></div>
      <div class="fly" aria-hidden="true"></div>
    </div>

    <!-- 操作バー -->
    <div class="drawBar">
      <div class="drawModeInline" aria-label="引き方を選ぶ">
        <label class="chip">
          <input type="radio" name="drawMode" value="1" checked>
          <div><strong>1枚</strong> <span>今のメッセージ</span></div>
        </label>

        <label class="chip">
          <input type="radio" name="drawMode" value="3">
          <div><strong>3枚</strong> <span>過去/現在/未来</span></div>
        </label>
      </div>

      <button id="btnDraw" class="drawBtn" type="button">カードを引く</button>
    </div>

    <!-- 結果は1つだけ（JSがここに描画） -->
    <div id="result" class="result-animate"></div>

    <!-- 共有用Canvas（JSが参照する） -->
    <canvas id="shareCanvas" width="1080" height="1080" style="display:none;"></canvas>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const VERSION = "2026.03.01.1";

    function showToast(message, duration = 3000) {
  const container = document.getElementById("toastContainer");
  if (!container) return;

  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = message;
  container.appendChild(el);

  void el.offsetWidth;
  el.classList.add("show");

  setTimeout(() => {
    el.classList.remove("show");
    el.addEventListener("transitionend", () => {
      if (el.parentNode) el.parentNode.removeChild(el);
    });
  }, duration);
}

    document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("btnDraw");
  if (btn && !btn.dataset.bound) {
    btn.dataset.bound = "1";
    btn.addEventListener("click", onDraw);
  }
});

    function isProbablyMobile() {
  // なるべく安全に「スマホっぽさ」判定
  const ua = navigator.userAgent || "";
  const touch = navigator.maxTouchPoints > 1;
  const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
  return /iPhone|Android|iPad|Mobile/i.test(ua) || (touch && coarse);
}

    function getCurrentDrawModeValue() {
      return document.querySelector('input[name="drawMode"]:checked')?.value || "1";
    }

    function updateDrawButtonLabels() {
      const btn = document.getElementById("btnDraw");
      if (btn) btn.textContent = "カードを引く";
    }

    function bindDrawModeLabelSync() {
      document.querySelectorAll('input[name="drawMode"]').forEach(r => {
        r.addEventListener("change", () => {
          if (r.checked) updateDrawButtonLabels();
        });
      });
    }

    function getYesNo(cardName, isReversed) {
      const neutralCards = [
        "節制", "月", "吊るされた男", "隠者"
      ];

      if (neutralCards.includes(cardName)) return "保留";
      return isReversed ? "NO" : "YES";
    }

    function deriveThemeLabel(primaryCard, hasPartnerDate) {
      const pickedTheme = getSelectedTheme();
      if (pickedTheme) return pickedTheme;
      if (hasPartnerDate) return "恋愛";
      // 既存の isMoneyTheme を使う（存在する前提。無ければ金運判定はスキップ）
      try {
        if (typeof isMoneyTheme === "function" && isMoneyTheme(primaryCard?.themes, primaryCard?.name_ja || primaryCard?.name)) {
          return "金運";
        }
      } catch (_) { }
      return "仕事";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const badge = document.getElementById("versionBadge");
      if (badge) badge.textContent = "VERSION: " + VERSION;
    });

    function scrollToResultSmooth() {
      const target = document.getElementById("result");
      if (!target) return;

      const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const behavior = reduce ? "auto" : "smooth";

    

      // 描画が完了してからスクロール（2フレーム待つ）
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try {
            target.scrollIntoView({ behavior, block: "start" });
          } catch (_) {
            // 古い環境フォールバック
            const top = target.getBoundingClientRect().top + window.pageYOffset - 8;
            window.scrollTo({ top, behavior });
          }
        });
      });
    }

    const STORAGE_KEY = "angelique_tarot_csv_rows_v2";
    let cards = [];
    const IS_CREATOR = location.hostname === "localhost" || location.hostname === "127.0.0.1";


    function applyCreatorMode() {
      const creator = document.getElementById("creatorOnly");
      const csvArea = document.getElementById("csvArea");

      if (!IS_CREATOR) {
        if (creator) creator.style.display = "none";
        if (csvArea) csvArea.style.display = "none"; // ★ CSV UI全体を隠す
      }
    }


    const CSV_PATH = new URL("public/data/deck.csv", location.href).toString();

    function guessDelimiterFromText(text) {
      const firstLine = (text || "").split(/\r?\n/)[0] || "";
      const tabCount = (firstLine.match(/\t/g) || []).length;
      const commaCount = (firstLine.match(/,/g) || []).length;
      // タブの方が多ければTSV、それ以外はCSV
      return tabCount > commaCount ? "\t" : ",";
    }

    async function loadBundledCsv() {
      console.log("loadBundledCsv called");
      setStatus("同梱CSVを読み込み中...");
      console.log("CSV_PATH =", CSV_PATH);

      try {
        const res = await fetch(CSV_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error(`fetch failed: ${res.status} ${res.statusText}`);
        const text = await res.text();

        const delim = guessDelimiterFromText(text);
        console.log("guessed delimiter =", JSON.stringify(delim));

        const results = Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          delimiter: delim
        });


        // ===== Column1〜 行を自動スキップする =====
        if (results.meta?.fields?.[0]?.toLowerCase() === "column1") {
          console.log("Dummy header detected. Re-parsing CSV...");
          results.data.shift();              // ダミー行を捨てる
        }
        // ========================================

        console.log("Papa meta.fields:", results.meta?.fields);
        console.log("First row sample:", results.data?.[0]);

        const rows = (results.data || [])
          .map(normalizeRow)
          .filter(r => r && r.id);


        console.log("normalized rows:", rows.length, rows[0]);

        if (!rows.length) {
          setStatus("同梱CSVの読み込みはできたが、id が取れません（ヘッダー名/区切りの可能性）。");
          return;
        }

        if (!validateCards(rows)) {
          setStatus("同梱CSVの必須列（id,name_ja,name_en,image）が不足しています。");
          return;
        }

        cards = rows;
setDeckInfo();
setStatus(`同梱CSV 読み込み完了：${cards.length}枚。引けます。`);
showReady();
} catch (e) {
  console.error(e);
  setStatus("同梱CSVの読み込みに失敗しました（Console参照）。");
  showToast("同梱CSVの読み込みに失敗しました。Consoleを確認してください。", 5000);
}
}


    // =====================
// DOM refs (declare once)
// =====================
let elStatus, elDeckInfo, elShuffleArea, elResult, elFile;

function bindDomRefs() {
  elStatus      = document.getElementById("status");
  elDeckInfo    = document.getElementById("deckInfo");
  elShuffleArea = document.getElementById("shuffleArea");
  elResult      = document.getElementById("result");
  elFile        = document.getElementById("csvFile");
}
function setDeckInfo() {
  if (!elDeckInfo) return;
  elDeckInfo.textContent = `Deck: ${cards.length} cards loaded`;
}
function setStatus(msg) {
  if (!elStatus) {
    console.warn("status element not found. msg =", msg);
    return;
  }
  elStatus.textContent = msg;
}
function showReady() {
  if (!elResult) return;
  elResult.innerHTML = `<div class="empty">
    準備OK。<br>
    ② 1枚/3枚を選ぶ → ③「カードを引く」
  </div>`;
}
function boot() {
  bindDomRefs();
  applyCreatorMode();

  // ★ DOMが取れてからイベントを付ける
  const btnUseSaved = document.getElementById("btnUseSaved");
  if (btnUseSaved) btnUseSaved.addEventListener("click", useSaved);

  const btnClearSaved = document.getElementById("btnClearSaved");
  if (btnClearSaved) btnClearSaved.addEventListener("click", clearSaved);

  if (elFile) elFile.addEventListener("change", onPickFile);

  loadBundledCsv();
}

document.addEventListener("DOMContentLoaded", boot);

    function pick(row, key) {
      // 完全一致
      if (row[key] != null) return row[key];

      // trim/BOMを無視して一致させる
      const want = normalizeKey(key);
      const hit = Object.keys(row).find(k => normalizeKey(k) === want);
      return hit ? row[hit] : "";
    }

    function normalizeKey(s) {
      return (s ?? "")
        .toString()
        .replace(/^\uFEFF/, "")
        .trim()
        .toLowerCase();
    }





    function pickAny(row, candidates) {
      for (const c of candidates) {
        const v = pick(row, c);
        if (v != null && String(v).trim() !== "") return String(v).trim();
      }
      return "";
    }



    function normalizeImagePath(s) {
      return (s ?? "")
        .toString()
        .replace(/^\uFEFF/, "")
        .trim()
        .replace(/^\/+/, "")
        .replace(/\\/g, "/");   // Windowsの \ を / に
    }

    function normalizeRow(row) {
      // キー正規化（BOM/空白/大小）
      const norm = (s) => (s ?? "").toString().replace(/^\uFEFF/, "").trim().toLowerCase();

      // row から key を大小/BOM無視で取る
      const get = (key) => {
        const want = norm(key);
        const hit = Object.keys(row).find(k => norm(k) === want);
        return hit ? String(row[hit] ?? "").trim() : "";
      };

      // 1) 通常ヘッダー（id, arcana, ... image）で来た場合
      const idNormal = get("id");
      if (idNormal) {
        // ヘッダー行が混じる保険
        if (idNormal.toLowerCase() === "id") return null;

        return {
          id: idNormal,
          arcana: get("arcana"),
          suit: get("suit"),
          number: get("number"),
          name_ja: get("name_ja"),
          name_en: get("name_en"),
          element: get("element"),
          polarity: get("polarity"),
          yes_no_upright: get("yes_no_upright"),
          yes_no_reversed: get("yes_no_reversed"),
          timing: get("timing"),
          themes: get("themes"),
          keywords_upright: get("keywords_upright"),
          keywords_reversed: get("keywords_reversed"),
          core_upright: get("core_upright"),
          interpretation_upright: get("interpretation_upright"),
          angel_upright: get("angel_upright"),
          action_upright: get("action_upright"),
          core_reversed: get("core_reversed"),
          interpretation_reversed: get("interpretation_reversed"),
          angel_reversed: get("angel_reversed"),
          action_reversed: get("action_reversed"),
          image: normalizeImagePath(get("image")),
        };
      }

      // Column形式は使わない
      return null;
    } // ← これが必要


    function validateCards(list) {
      // id さえあればOK（imageは無くても動く）
      const bad = list.find(r => !r.id);
      return !bad;
    }



    function onPickFile() {
      const file = elFile.files?.[0];
      if (!file) return;

      setStatus("CSVを読み込み中...");

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = reader.result?.toString() || "";
          const delim = guessDelimiterFromText(text);
          console.log("file guessed delimiter =", JSON.stringify(delim));

          const results = Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            delimiter: delim
          });



          // ===== Column1〜 行を自動スキップする =====
          if (results.meta?.fields?.[0]?.toLowerCase() === "column1") {
            console.log("Dummy header detected. Re-parsing CSV...");
            results.data.shift();
          }
          // ========================================




          const rows = (results.data || [])
            .map(normalizeRow)
            .filter(r => r && r.id);


          if (!rows.length) {
            setStatus("CSVにデータがありません（区切り/ヘッダーを確認）。");
            return;
          }
          if (!validateCards(rows)) {
            setStatus("必須列（id,name_ja,name_en,image）が不足しています。");
            return;
          }

          cards = rows;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
          setDeckInfo();
          setStatus(`読み込み完了：${cards.length}枚。引けます。`);
          showReady();
        } catch (e) {
          console.error(e);
          setStatus("読み込みでエラー。CSV形式を確認してください。");
        }
      };
      reader.onerror = () => {
        setStatus("ファイルの読み込みに失敗しました。");
      };
      reader.readAsText(file, "utf-8");
    }

    function useSaved() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        setStatus("保存済みCSVがありません。まずCSVを読み込んでください。");
        return;
      }
      try {
        const rows = JSON.parse(saved);
        if (!Array.isArray(rows) || !rows.length) {
          setStatus("保存済みCSVが壊れています。いったん消して読み込み直してください。");
          return;
        }
        cards = rows;
        setDeckInfo();
        setStatus(`保存済みCSVを読み込みました：${cards.length}枚。`);
        showReady();
      } catch (e) {
        setStatus("保存済みCSVの読み込みに失敗。消して読み込み直してください。");
      }

// Stable picker (seeded)
// =========================
function hash32(str){
  // FNV-1a 32bit
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}

/**
 * arr: 配列
 * seed: 文字列（例 "2026-03-02|The World|U|work"）
 */
function pickStable(arr, seed){
  if (!Array.isArray(arr) || arr.length === 0) return "";
  const idx = hash32(String(seed || "seed")) % arr.length;
  return arr[idx];
}

function toShortAction(s, maxLen = 22){
  const t = (s ?? "").toString().trim();
  if (!t) return "呼吸が深くなる選択をひとつ";

  // 先頭の記号や箇条書き記号を削る

function buildReadableReason({ basePoetic = "", baseExplain = "", closing = "", optionalMetaLines = [] }){
  const clean = (s) => (s ?? "").toString().trim();

  const p = clean(basePoetic);
  const e = clean(baseExplain);
  const c = clean(closing);

  const meta = Array.isArray(optionalMetaLines)
    ? optionalMetaLines.map(clean).filter(Boolean)
    : [];

  // 長文になりすぎるのを軽く抑える（必要なら調整可）
  const shorten = (s, max = 160) => {
    const t = clean(s);
    if (!t) return "";
    if (t.length <= max) return t;
    return t.slice(0, max) + "…";
  };

  // 「理由」なので、詩→説明→締め で一続きにする
  // ※ UI側が white-space: pre-line なら \n が綺麗に効く
  const parts = [
    shorten(p, 120),
    shorten(e, 220),
    ...meta.map(m => shorten(m, 120)),
    shorten(c, 90),
  ].filter(Boolean);

  // 文章が何も無いケースでも落とさない
  if (!parts.length) {
    return "いまは状況を整えるほど、次の流れが見えてくる時です。";
  }

  return parts.join("\n");
}

    function cardImageUrl(image) {
  let raw = (image ?? "").toString().trim();
  if (!raw) return "public/cards/back.webp"; // back.pngしか無いなら back.png に

  raw = raw
    .replace(/^\uFEFF/, "")
    .replace(/^"+|"+$/g, "")
    .replace(/^'+|'+$/g, "")
    .replace(/^\/+/, "")
    .replace(/\\/g, "/");

  // すでに絶対URLならそのまま
  if (/^https?:\/\//i.test(raw)) return raw;

  // 拡張子が無ければ webp を付ける（重要）
  if (!/\.(webp|png|jpg|jpeg)$/i.test(raw)) raw += ".webp";

  return encodeURI("public/cards/" + raw);
}


    function handleCardImgError(img) {
      const tried = parseInt(img.dataset.tried || "0", 10);

      // まず、元の src から「拡張子だけ」差し替えて試す
      const src = img.getAttribute("src") || "";
      const base = src.replace(/\.(webp|png|jpg|jpeg)(\?.*)?$/i, ""); // 末尾拡張子を除去
      const query = (src.match(/(\?.*)$/) || [""])[0];

      const exts = ["webp", "png", "jpg", "jpeg"];

      // すでに back.png なら終了（無限ループ防止）
      if (src.includes("back.png")) return;

      if (tried < exts.length) {
        img.dataset.tried = String(tried + 1);
        img.src = `${base}.${exts[tried]}${query}`;
        return;
      }
      console.warn("[MISSING IMAGE]", {
        alt: img.alt,
        lastTried: src,
        base
      });

      // 最後の砦：裏面
      img.src = "public/cards/back.png";
    }

    /* =========================
   Four Pillars (Simplified) -> Five Elements
   - year boundary: approx LiChun (Feb 4)
   - month: approx solar month mapping (fixed ranges)
   - day: sexagenary by JDN
   - hour: optional (time)
   ========================= */

const STEMS = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const BRANCHES = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

// 五行：天干
const STEM_TO_ELEM = {
  "甲":"木","乙":"木",
  "丙":"火","丁":"火",
  "戊":"土","己":"土",
  "庚":"金","辛":"金",
  "壬":"水","癸":"水",
};
function normalizeDateInput(v){
  const s = (v || "").toString().trim();
  if (!s) return "";
  // 1980/04/06 や 1980.04.06 も吸収して YYYY-MM-DD に寄せる
  const m = s.match(/^(\d{4})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})$/);
  if (m) {
    const Y = m[1];
    const M = String(m[2]).padStart(2,"0");
    const D = String(m[3]).padStart(2,"0");
    return `${Y}-${M}-${D}`;
  }
  // type="date" は元々 YYYY-MM-DD のはずなのでそれはそのまま通す
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return ""; // 変な文字列は空扱い（計算しない）
}

function normalizeTimeInput(v){
  const s = (v || "").toString().trim();
  if (!s) return "";
  // "1545" -> "15:45" も許す
  const m = s.match(/^(\d{1,2}):?(\d{2})$/);
  if (!m) return "";
  const hh = String(m[1]).padStart(2,"0");
  const mm = String(m[2]).padStart(2,"0");
  return `${hh}:${mm}`;
}
// 地支→（蔵干）を簡易配分（重み付き）
// 例：子=癸(100)、丑=己60/癸30/辛10 など
const BRANCH_HIDDEN = {
  "子":[["癸",1.00]],
  "丑":[["己",0.60],["癸",0.30],["辛",0.10]],
  "寅":[["甲",0.60],["丙",0.25],["戊",0.15]],
  "卯":[["乙",1.00]],
  "辰":[["戊",0.60],["乙",0.25],["癸",0.15]],
  "巳":[["丙",0.60],["庚",0.25],["戊",0.15]],
  "午":[["丁",0.70],["己",0.30]],
  "未":[["己",0.60],["丁",0.25],["乙",0.15]],
  "申":[["庚",0.60],["壬",0.25],["戊",0.15]],
  "酉":[["辛",1.00]],
  "戌":[["戊",0.60],["辛",0.25],["丁",0.15]],
  "亥":[["壬",0.70],["甲",0.30]],
};

// 年干→寅月の月干（五虎遁の起点）
const YEAR_STEM_TO_TIGER_MONTH_STEM = {
  "甲":"丙","己":"丙",
  "乙":"戊","庚":"戊",
  "丙":"庚","辛":"庚",
  "丁":"壬","壬":"壬",
  "戊":"甲","癸":"甲",
};

// 月支（寅=1）を得たら、寅月の月干から順に進める
function monthStemFrom(yearStem, monthBranch){
  const startStem = YEAR_STEM_TO_TIGER_MONTH_STEM[yearStem] || "丙"; // 寅月の月干
  const startIndex = STEMS.indexOf(startStem);
  const mIndex = BRANCHES.indexOf(monthBranch);
  const tigerIndex = BRANCHES.indexOf("寅");
  const offset = (mIndex - tigerIndex + 12) % 12; // 寅から何ヶ月進んだか
  return STEMS[(startIndex + offset) % 10];
}

// 簡易：節入りの厳密計算はせず、月の範囲で月支を推定（立春＝2/4起点）
function approxMonthBranch(y, m, d){
  // おおよその節入り境界（日本向けのざっくり）
  // 寅:2/4-3/5, 卯:3/6-4/4, 辰:4/5-5/5, 巳:5/6-6/5, 午:6/6-7/6,
  // 未:7/7-8/7, 申:8/8-9/7, 酉:9/8-10/7, 戌:10/8-11/6, 亥:11/7-12/6,
  // 子:12/7-1/5, 丑:1/6-2/3
  const mmdd = m*100 + d;
  if (mmdd >= 204 && mmdd <= 305) return "寅";
  if (mmdd >= 306 && mmdd <= 404) return "卯";
  if (mmdd >= 405 && mmdd <= 505) return "辰";
  if (mmdd >= 506 && mmdd <= 605) return "巳";
  if (mmdd >= 606 && mmdd <= 706) return "午";
  if (mmdd >= 707 && mmdd <= 807) return "未";
  if (mmdd >= 808 && mmdd <= 907) return "申";
  if (mmdd >= 908 && mmdd <= 1007) return "酉";
  if (mmdd >= 1008 && mmdd <= 1106) return "戌";
  if (mmdd >= 1107 && mmdd <= 1206) return "亥";
  if (mmdd >= 1207 || mmdd <= 105) return "子";
  return "丑"; // 1/6-2/3
}

// 立春（2/4）以前は前年扱い（簡易）
function approxYearForFourPillars(y, m, d){
  const mmdd = m*100 + d;
  if (mmdd < 204) return y - 1;
  return y;
}

// JDN（ユリウス日）計算
function toJdn(y, m, d){
  // Gregorian calendar
  const a = Math.floor((14 - m) / 12);
  const y2 = y + 4800 - a;
  const m2 = m + 12*a - 3;
  return d + Math.floor((153*m2 + 2)/5) + 365*y2 + Math.floor(y2/4) - Math.floor(y2/100) + Math.floor(y2/400) - 32045;
}

// ====== Day Ganzhi offset calibration ======
// アンカー: 1980-04-06 は「乙亥」想定（あなたが提示した基準）
function findDayOffsetFor(y, m, d, targetStem, targetBranch){
  const jdn = toJdn(y, m, d);
  for (let off = 0; off < 60; off++){
    const idx = (jdn + off) % 60;
    const stem = STEMS[idx % 10];
    const branch = BRANCHES[idx % 12];
    if (stem === targetStem && branch === targetBranch) return off;
  }
  return null;
}

// ここで offset を確定（見つからなければ旧値49を使う）
const DAY_OFFSET = (()=>{
  const off = findDayOffsetFor(1980, 4, 6, "乙", "亥");
  return (off == null) ? 49 : off;
})();

// 日干支（60干支）: JDN基準から算出
function dayGanzhi(y,m,d){
  const jdn = toJdn(y,m,d);
  const idx = (jdn + DAY_OFFSET) % 60;
  const stem = STEMS[idx % 10];
  const branch = BRANCHES[idx % 12];
  return { stem, branch };
}

// 年干支（簡易）：1984=甲子を基準に
function yearGanzhi(y){
  const base = 1984; // 甲子
  const diff = y - base;
  const idx = (diff % 60 + 60) % 60;
  return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

// 時支（任意）
function hourBranchFromTime(timeStr){
  if (!timeStr) return null;
  const [hh, mm] = timeStr.split(":").map(n => parseInt(n,10));
  if (Number.isNaN(hh)) return null;
  // 子=23-0, 丑=1-2, ... 2時間刻み
  // 23:00-00:59 => 子
  const h = hh;
  const index = Math.floor(((h + 1) % 24) / 2); // 23->0, 0->0, 1->1...
  return BRANCHES[index];
}

// 日干から時干を出す（五鼠遁の起点）
function hourStemFromDayStem(dayStem, hourBranch){
  if (!hourBranch) return null;
  // 甲己日: 甲子, 乙庚日: 丙子, 丙辛日: 戊子, 丁壬日: 庚子, 戊癸日: 壬子
  const startMap = {
    "甲":"甲","己":"甲",
    "乙":"丙","庚":"丙",
    "丙":"戊","辛":"戊",
    "丁":"庚","壬":"庚",
    "戊":"壬","癸":"壬",
  };
  const startStem = startMap[dayStem] || "甲"; // 子時の時干
  const startIndex = STEMS.indexOf(startStem);
  const bIndex = BRANCHES.indexOf(hourBranch);
  const ziIndex = BRANCHES.indexOf("子");
  const offset = (bIndex - ziIndex + 12) % 12;
  return STEMS[(startIndex + offset) % 10];
}

// 五行スコア（天干=強め、地支蔵干=合算）
// ざっくり：干=1.0、支（蔵干合計）=1.0、4柱で最大8前後のイメージ
function calcFiveElements({ yStem,yBranch, mStem,mBranch, dStem,dBranch, hStem,hBranch }){
  const score = { "木":0, "火":0, "土":0, "金":0, "水":0 };

  const addStem = (s, w=1.0)=>{
    if (!s) return;
    const e = STEM_TO_ELEM[s];
    if (e) score[e] += w;
  };
  const addBranch = (b, w=1.0)=>{
    if (!b) return;
    const hidden = BRANCH_HIDDEN[b];
    if (!hidden) return;
    for (const [hs, ratio] of hidden){
      addStem(hs, w * ratio);
    }
  };

  // 天干（各1）
  addStem(yStem, 1.0); addStem(mStem, 1.0); addStem(dStem, 1.0);
  if (hStem) addStem(hStem, 1.0);

  // 地支（各1）
  addBranch(yBranch, 1.0); addBranch(mBranch, 1.0); addBranch(dBranch, 1.0);
  if (hBranch) addBranch(hBranch, 1.0);

  return score;
}

function toDots(v){
  // 見た目のための丸め：0〜3を中心に
  const n = Math.max(0, Math.min(5, Math.round(v)));
  return "●".repeat(n) + "○".repeat(Math.max(0, 5-n));
}

function pickStrongWeak(score){
  const entries = Object.entries(score);
  entries.sort((a,b)=>b[1]-a[1]);
  const strong = entries[0];
  const weak = entries[entries.length-1];
  return { strong, weak };
}

    // ---- HTMLエスケープ ----
    function escapeHtml(str) {
      return (str ?? "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /* =========================================
       ✨ Share & Copy Logic
       ========================================= */
    function getResultPlainText() {
      // 画面上のテキストを一括取得して整形
      const res = document.getElementById("result");
      if (!res || !res.innerText) return "";

      let text = res.innerText;
      // 不要なボタンのテキストを除去
      text = text.replace(/Share This Reading\nShare\nCopy\nShare Image\nもう一度ひく\n数字の意味を詳しく知りたい方はこちら/g, "");
      return text.trim() + "\n\n#AngeliqueTarot\nhttps://angeliquetarot.github.io/";
    }

    function copyResultText() {
      const text = getResultPlainText();
      if (!text) return;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          showToast("コピーしました");
        }).catch(err => {
          console.error("Copy failed", err);
          fallbackCopyText(text);
        });
      } else {
        fallbackCopyText(text);
      }
    }

    function fallbackCopyText(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      // 表示領域外に
      textArea.style.position = "fixed";
      textArea.style.top = "-999999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) showToast("コピーしました");
        else showToast("コピーに失敗しました");
      } catch (err) {
        console.error('Fallback copy fail', err);
        showToast("コピーに失敗しました");
      }
      document.body.removeChild(textArea);
    }

    async function shareResultText() {
      const text = getResultPlainText();
      if (!text) return;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Angelique Tarot Reading',
            text: text
          });
          showToast("シェアしました！");
        } catch (err) {
          console.error("Share failed or was cancelled:", err);
          // 失敗またはキャンセルされた場合は確実にクリップボードコピーへ
          copyResultText();
        }
      } else {
        // フォールバック: コピー
        copyResultText();
      }
    }

    // --- Share Image (Canvas) ---
    async function shareResultImage() {
  const canvas = document.getElementById("shareCanvas");
  if (!canvas) { showToast("Canvasが見つかりません"); return; }

  const ctx = canvas.getContext("2d");
  if (!ctx) { showToast("Canvas描画に失敗しました"); return; }

  // 1. 背景描画 (暗いトーン)
  ctx.fillStyle = "#11111d";
  ctx.fillRect(0, 0, 1080, 1080);

  // 上部のグラデーション
  let grad = ctx.createLinearGradient(0, 0, 0, 400);
  grad.addColorStop(0, "rgba(245, 230, 179, 0.15)");
  grad.addColorStop(1, "rgba(17, 17, 29, 0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1080, 1080);

  // 2. 金色の枠線
  ctx.strokeStyle = "rgba(214, 178, 94, 0.4)";
  ctx.lineWidth = 4;
  ctx.strokeRect(40, 40, 1000, 1000);
  ctx.strokeStyle = "rgba(214, 178, 94, 0.15)";
  ctx.lineWidth = 1;
  ctx.strokeRect(50, 50, 980, 980);

  // 3. タイトル
  ctx.fillStyle = "#f5e6b3"; // pale gold
  ctx.font = "40px 'Cinzel', serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText("Angelique Tarot", 540, 80);

  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, "0")}.${String(today.getDate()).padStart(2, "0")}`;
  ctx.font = "24px 'Cinzel', serif";
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.fillText(dateStr, 540, 130);

  // 4. 画像の描画 (現在表示されているカード画像を集める)
  const imgs = document.querySelectorAll("#result .cardImg");
  if (imgs.length === 0) {
    showToast("カード画像がありません");
    return;
  }

  const drawMode = document.querySelector('input[name="drawMode"]:checked')?.value || "1";
  const count = (String(drawMode) === "3") ? 3 : 1;

  const cardW = count === 1 ? 300 : 240;
  const cardH = count === 1 ? 480 : 384;
  const startY = 220;

  const loadImg = (src, isReversed) => new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve({ img, isReversed, ok: true });
    img.onerror = () => resolve({ img: null, isReversed, ok: false });
    img.src = src;
  });

  const promises = [];
  const cardElements = document.querySelectorAll("#result .tcard");
  cardElements.forEach(cel => {
    const imgEl = cel.querySelector("img");
    if (imgEl) {
      const isReversed = cel.querySelector(".badge")?.classList.contains("rev") || imgEl.classList.contains("reversed");
      promises.push(loadImg(imgEl.src, isReversed));
    }
  });

  const loadedImgs = await Promise.all(promises);
  const validImgs = loadedImgs.filter(item => item.ok);

  if (validImgs.length === 1) {
    drawCardOnCanvas(ctx, validImgs[0], 540 - cardW / 2, startY, cardW, cardH);
  } else if (validImgs.length === 3) {
    const gap = 40;
    const totalW = cardW * 3 + gap * 2;
    const startX = 540 - totalW / 2;
    drawCardOnCanvas(ctx, validImgs[0], startX, startY, cardW, cardH);
    drawCardOnCanvas(ctx, validImgs[1], startX + cardW + gap, startY, cardW, cardH);
    drawCardOnCanvas(ctx, validImgs[2], startX + (cardW + gap) * 2, startY, cardW, cardH);
  } else {
    showToast("画像の読み込みに失敗しました");
    return;
  }

  // 5. 結論テキスト
  const summaryTitleEl = document.querySelector("#result .summaryTitle");
  if (summaryTitleEl) {
    ctx.font = "bold 28px 'Noto Serif JP', serif";
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillText(summaryTitleEl.innerText.replace("【結論】", ""), 540, startY + cardH + 60);
  }

  // Footer
  ctx.font = "20px 'Noto Serif JP', serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText("Search 'Angelique Tarot' to pull your own cards.", 540, 980);

    // 6. 出力（PNG化して、スマホ=共有 / PC=モーダル表示）
  canvas.toBlob(async (blob) => {
    if (!blob) {
      showToast("画像の生成に失敗しました");
      fallbackCopyText(getResultPlainText());
      return;
    }

    const file = new File([blob], "reading.png", { type: "image/png" });

    // ✅ PCは共有シートを使わず、モーダルで画像を見せる
    if (!isProbablyMobile()) {
      openImageFallbackFromBlob(blob);
      return;
    }

    // ✅ スマホは Share API が使えるなら使う
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Angelique Tarot Reading",
          text: "私のタロットリーディング結果です #AngeliqueTarot"
        });
        showToast("画像をシェアしました！");
      } catch (err) {
        console.error("Image Share failed or cancelled:", err);
        // キャンセル時はモーダルへ
        openImageFallbackFromBlob(blob);
      }
    } else {
      openImageFallbackFromBlob(blob);
    }
  }, "image/png");
}

// ✅ ここは shareResultImage の「外」に置く（超重要）
function openImageFallbackFromBlob(blob) {
  showToast("画像を表示しました。右クリック/長押しで保存できます", 3500);

  const modal = document.getElementById("shareModal");
  const imgEl = document.getElementById("shareModalImg");
  const dl = document.getElementById("shareModalDownload");
  const openBtn = document.getElementById("shareModalOpen");
  const closeBtn = document.getElementById("shareModalClose");

  if (!modal || !imgEl || !dl || !closeBtn || !openBtn) {
    fallbackCopyText(getResultPlainText());
    showToast("画像表示UIが見つかりません。テキストをコピーしました。", 4000);
    return;
  }

  const url = URL.createObjectURL(blob);
  imgEl.src = url;
  dl.href = url;
  openBtn.href = url;

  modal.style.display = "block";

  const close = () => {
    modal.style.display = "none";
    try { URL.revokeObjectURL(url); } catch {}
    closeBtn.removeEventListener("click", close);
    modal.removeEventListener("click", onBg);
  };

  const onBg = (e) => {
    if (e.target === modal) close();
  };

  closeBtn.addEventListener("click", close);
  modal.addEventListener("click", onBg);
}

 

    function drawCardOnCanvas(ctx, item, x, y, w, h) {
      if (!item || !item.img) return;
      ctx.save();

      // 影
      ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 10;

      if (item.isReversed) {
        // 逆位置なら回転
        ctx.translate(x + w / 2, y + h / 2);
        ctx.rotate(Math.PI);
        ctx.drawImage(item.img, -w / 2, -h / 2, w, h);
      } else {
        ctx.drawImage(item.img, x, y, w, h);
      }
      ctx.restore();
    }
