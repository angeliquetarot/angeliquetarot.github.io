<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angelique Tarot (CSV版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #666132;
      --text: #ffffff;
      /* 文字は白系に */
      --muted: rgba(231, 206, 233, 0.72);
      /* 補助文字 */
      --line: rgba(133, 45, 45, 0.14);

      --accent: #f0abfc;
      /* 天使ピンク */
      --accent2: #a5b4fc;
      /* ラベンダー */

      --good: #86efac;
      --warn: #fde68a;
      --bad: #fda4af;
    }


    * {
      box-sizing: border-box
    }

    body{
  font-family: "Shippori Mincho", serif;
}
h1,h2,.shareTitle,.summaryTitle{
  font-family:"Cinzel","Shippori Mincho",serif;
  letter-spacing:.04em;
}




    .app { width: min(1100px, 100%); margin-inline: auto; }

    header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: .04em;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.4;
    }

    .panel {
      background: rgba(20, 16, 30, .62);
      /* 半透明の闇 */
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      border: 1px solid rgba(255, 255, 255, .25);
      border-radius: 18px;
      padding: 14px;

      box-shadow:
        0 14px 40px rgba(0, 0, 0, .45),
        inset 0 0 0 1px rgba(255, 255, 255, .12);
    }


    .topGrid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
    }

     


    .drawMode {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 10px 12px;
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, background .12s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, .08)
    }

    .chip input {
      accent-color: var(--accent);
      margin: 0
    }

    .chip strong {
      font-size: 13px
    }

    .chip span {
      font-size: 12px;
      color: var(--muted)
    }

    .btnRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    button {
      border: 0;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 14px;
      color: var(--text);
      background: linear-gradient(135deg, rgba(167, 139, 250, .9), rgba(96, 165, 250, .9));
      font-weight: 700;
      letter-spacing: .02em;
      box-shadow: 0 10px 25px rgba(96, 165, 250, .14);
      transition: transform .12s ease, filter .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: saturate(1.05)
    }

    button.secondary {
      background: linear-gradient(135deg,
          rgba(240, 171, 252, .95),
          rgba(165, 180, 252, .95));
      box-shadow:
        0 10px 30px rgba(165, 180, 252, .25),
        inset 0 0 0 1px rgba(255, 255, 255, .25);
    }

    button.secondary:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .09)
    }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .stage {
      margin-top: 12px;
      padding: 14px;
    }

    .stageTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .stageTitle {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stageTitle h2 {
      margin: 0;
      font-size: 16px;
    }

    .stageTitle p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }


    .deck {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%);
      border-radius: 30px;
      overflow: hidden;

      /* ★裏面画像を表示 */
      background: url("public/cards/back.png") center / cover no-repeat;

      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow: 0 18px 40px rgba(0, 0, 0, .45);
    }

    /* 文字ロゴは消したいならこのまま削除してOK */
    .deck::after {
      content: "";
    }

    /* 飛ぶカード（裏面） */
    .fly {
      position: absolute;
      width: 130px;
      height: 185px;
      border-radius: 20px;
      overflow: hidden;

      /* ★裏面画像を表示 */
      background: url("public/cards/back.png") center / cover no-repeat;

      border: 1px solid rgba(255, 255, 255, .15);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      box-shadow: 0 16px 30px rgba(0, 0, 0, .35);
    }

    .shuffling .deck {
      animation: deckBreath 1.8s ease-in-out infinite;
    }

    @keyframes deckBreath {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
        box-shadow: 0 18px 40px rgba(0, 0, 0, .45),
          0 0 22px rgba(200, 160, 255, .35);
      }

      50% {
        transform: translate(-50%, -50%) scale(1.05) rotate(2deg);
        box-shadow: 0 22px 60px rgba(0, 0, 0, .55),
          0 0 38px rgba(160, 200, 255, .55);
      }
    }


    .tcardHeader {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .10);
      background: rgba(0, 0, 0, .18);
    }

    .tcardTitle {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tcardTitle .pos {
      font-size: 12px;
      color: rgba(255, 255, 255, .78);
      letter-spacing: .06em;
    }

    .tcardTitle .name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .tcardTitle .sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .badge {
      align-self: flex-start;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .15);
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .85);
      white-space: nowrap;
    }

    .badge.up {
      border-color: rgba(34, 197, 94, .35);
      background: rgba(34, 197, 94, .12)
    }

    .badge.rev {
      border-color: rgba(245, 158, 11, .35);
      background: rgba(245, 158, 11, .12)
    }

    .tcardVisual {
      padding: 12px;
      display: flex;
      justify-content: center;
    }

   
    .face {
      width: 128px;
      height: 188px;
      border-radius: 18px;
      background:
        radial-gradient(120px 90px at 30% 20%, rgba(167, 139, 250, .30), transparent 60%),
        radial-gradient(140px 110px at 70% 80%, rgba(96, 165, 250, .22), transparent 65%),
        linear-gradient(180deg, rgba(255, 255, 255, .10), rgba(255, 255, 255, .05));
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow: 0 16px 30px rgba(0, 0, 0, .40);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: transform .2s ease;
    }

    .face .mono {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, .7);
      letter-spacing: .1em;
    }

    .face .big {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      color: rgba(255, 255, 255, .86);
      text-align: center;
      padding: 0 12px;
      line-height: 1.25;
    }

    .face.reversed {
      transform: rotate(180deg);
    }

    .tcardBody {
      padding: 0 12px 12px;
      color: rgba(255, 255, 255, .90);
      font-size: 13px;
      line-height: 1.62;
    }

    .line {
      padding: 10px 0;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .line:first-child {
      border-top: 0
    }

    .k {
      color: rgba(255, 255, 255, .90);
      font-weight: 900;
      margin-right: 6px;
    }

    /* Keyword chips */
    .kwWrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .kw {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .88);
      white-space: nowrap;
    }

    .kw.rev {
      border-color: rgba(245, 158, 11, .25);
      background: rgba(245, 158, 11, .10)
    }

    .kw.up {
      border-color: rgba(96, 165, 250, .25);
      background: rgba(96, 165, 250, .10)
    }

    details {
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .14);
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 10px 12px;
      color: rgba(255, 255, 255, .88);
      font-weight: 800;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .detailsBody {
      padding: 0 12px 12px;
      color: rgba(255, 255, 255, .86);
      font-size: 12.5px;
      line-height: 1.6;
    }

    .note {
      margin-top: 10px;
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(245, 158, 11, .25);
      background: rgba(245, 158, 11, .10);
      color: rgba(255, 255, 255, .88);
      font-size: 12px;
      line-height: 1.55;
    }

    .empty {
      padding: 14px;
      border: 1px dashed rgba(255, 255, 255, .18);
      border-radius: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      background: rgba(0, 0, 0, .12);
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }

    /* ===== Yes / No 表示を大きくする ===== */
    .ynRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .yn {
      font-size: 16px;
      /* ← 大きさ（ここを18や20にしてもOK） */
      font-weight: 900;
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .15);
    }

    .yn.up {
      border-color: #4ade80;
      background: rgba(74, 222, 128, .25);
    }

    .yn.rev {
      border-color: #facc15;
      background: rgba(250, 204, 21, .25);
    }

    .cardWrap {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    /* 1枚引きの表示（上の1枚だけ出るカード） */
    .cardWrap {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .cardFrame {
      width: min(360px, 78vw);
      /* 中央で大きめ */
    }

    #tarotCard.tarotCard {
      width: 100%;
      height: auto;
      display: block;
      aspect-ratio: 2 / 3;
      /* 崩れ防止 */
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, .40);
      border: 1px solid rgba(255, 255, 255, .18);
    }

    /* 逆位置：回転だけでOK（translateは不要） */
    #tarotCard.tarotCard.reversed {
      transform: rotate(180deg);
    }

   
    /* ===== 表示レイアウト（最終決定版） ===== */
    .cardsGrid {
      margin-top: 14px;
      display: grid;
      gap: 16px;
    }

    .cardsGrid.single {
      grid-template-columns: 1fr;
      justify-items: center;
    }

    .cardsGrid.three {
      grid-template-columns: repeat(3, 1fr);
      justify-items: center;
      align-items: start;
    }

    

    .cardImg.reversed {
      transform: rotate(180deg);
    }


    /* === シャッフル：光のオーラ === */
    .shuffleArea::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 50% 50%,
          rgba(200, 160, 255, .35),
          rgba(160, 200, 255, .18),
          transparent 60%);
      opacity: .6;
      animation: auraPulse 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes auraPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: .45
      }

      50% {
        transform: scale(1.08);
        opacity: .75
      }
    }

    /* === 飛ぶカードの動きを優雅にする === */
    .shuffling .fly {
      animation-timing-function: cubic-bezier(.22, .61, .36, 1);
    }

    /* ===== サイズ調整（ここだけ触ればOK）===== */
    :root {
      --deck-size: 240px;
      /* シャッフル中央の束（大きく） */
      --fly-w: 160px;
      /* 飛ぶカード幅（大きく） */
      --fly-h: 230px;
      /* 飛ぶカード高さ（大きく） */

      --result-w-1: min(300px, 78vw);
      /* 1枚引きの結果（少し小さく） */
      --result-w-3: min(240px, 26vw);
      /* 3枚引きの結果（小さく） */
      --result-w-3-mid: min(260px, 28vw);
      /* 真ん中だけ少し強調 */
    }

    /* シャッフルエリア高さも少し上げる（大きくした分の余裕） */
    .shuffleArea {
      height: 220px;
    }

    /* 中央デッキ（束） */
    .deck {
      width: var(--deck-size) !important;
      height: var(--deck-size) !important;
      border-radius: 28px;
    }

    /* 飛ぶカード */
    .fly {
      width: var(--fly-w) !important;
      height: var(--fly-h) !important;
      border-radius: 22px;
    }

    

    /* スマホ：3枚横並びの崩れ防止 */
    @media (max-width: 480px) {
      .shuffleArea {
        height: 200px;
      }

      :root {
        --result-w-3: 28vw;
        --result-w-3-mid: 32vw;
      }
    }

    /* ===== シャッフル表示エリア：デッキサイズに合わせて自動で広げる ===== */
    :root {
      /* すでに入れてるならここは合わせるだけでOK */
      --deck-size: 240px;
    }

    /* deck が大きくなっても切れない高さにする */
    .shuffleArea {
      height: calc(var(--deck-size) + 80px) !important;
      /* ← 余白ぶん増やす */
      min-height: 220px;
      overflow: hidden;
      /* 演出を枠内に収めたいなら hidden のままでOK */
    }

    /* スマホは少し控えめに */
    @media (max-width: 520px) {
      .shuffleArea {
        height: calc(var(--deck-size) + 60px) !important;
        min-height: 200px;
      }
    }

    /* クリックが吸われるのを防ぐ（超重要） */
    .shuffleArea,
    .shuffleArea * {
      pointer-events: none;
    }

    

    :root {
      --deck-w: 220px;
      /* シャッフル束：幅 */
      --deck-h: 320px;
      /* シャッフル束：高さ（カード比率に） */
      --deck-radius: 22px;
      /* 角丸 */
    }

    /* シャッフルの箱を「カード高さ + 余白」に */
    .shuffleArea {
      height: calc(var(--deck-h) + 80px) !important;
      min-height: calc(var(--deck-h) + 80px) !important;
      overflow: hidden;
    }

    .deck {
      width: var(--deck-w) !important;
      height: var(--deck-h) !important;
      border-radius: var(--deck-radius) !important;
      background: url("public/cards/back.png") center / cover no-repeat;
    }

    .fly {
      width: calc(var(--deck-w) * 0.72) !important;
      height: calc(var(--deck-h) * 0.72) !important;
      border-radius: calc(var(--deck-radius) * 0.95) !important;
      background: url("public/cards/back.png") center / cover no-repeat;
    }

    /* ===== シャッフル束を「カード比率(2:3)」で固定して、いびつを解消 ===== */
    :root {
      --shuffle-w: 220px;
      /* シャッフルカードの幅（大きさはここ） */
      --shuffle-r: 22px;
      /* 角丸 */
    }

    /* 箱もカード高さに合わせて確保（切れ防止） */
    .shuffleArea {
      height: calc(var(--shuffle-w) * 1.5 + 90px) !important;
      /* 1.5 = 3/2 */
      min-height: calc(var(--shuffle-w) * 1.5 + 90px) !important;
      overflow: hidden;
    }

    /* 中央の束（deck） */
    .deck {
      width: var(--shuffle-w) !important;
      height: auto !important;
      aspect-ratio: 2 / 3 !important;
      /* ←これが決定打 */
      border-radius: var(--shuffle-r) !important;
      background: url("public/cards/back.png") center / cover no-repeat !important;
    }

    /* 飛ぶカード（fly）も同じ比率で統一 */
    .fly {
      width: calc(var(--shuffle-w) * 0.78) !important;
      height: auto !important;
      aspect-ratio: 2 / 3 !important;
      border-radius: calc(var(--shuffle-r) * 0.95) !important;
      background: url("public/cards/back.png") center / cover no-repeat !important;
    }

    .deck,
    .fly {
      background-size: contain !important;
      /* ←切れない */
      background-color: rgba(0, 0, 0, .18);
      /* 余白が出た時も綺麗 */
    }

    /* ================================
   📱 Mobile最適化：シャッフル＆3枚引き
   ================================ */

    /* まずはPC/共通の基準（触るのはここだけでもOK） */
    :root {
      --shuffle-w: 220px;
      /* PCのシャッフル幅 */
    }

    /* 3枚引き：重なりの原因は「カードが大きすぎ」or「tcardが伸びてる」なので、
   グリッドの各列を“必ず均等”にして、画像幅をvwで固定 */
    .cardsGrid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
      gap: 12px !important;
    }

    

    /* ---- モバイル本番調整 ---- */
    @media (max-width: 520px) {

      /* シャッフルカードが大きすぎる問題 */
      :root {
        --shuffle-w: 150px;
        /* ←携帯は小さめに */
      }

      /* シャッフル箱も連動して縮める */
      .shuffleArea {
        height: calc(var(--shuffle-w) * 1.5 + 60px) !important;
        min-height: calc(var(--shuffle-w) * 1.5 + 60px) !important;
      }

      /* シャッフル束＆飛ぶカード：比率は維持したまま縮小 */
      .deck {
        width: var(--shuffle-w) !important;
        aspect-ratio: 2 / 3 !important;
      }

      .fly {
        width: calc(var(--shuffle-w) * 0.78) !important;
        aspect-ratio: 2 / 3 !important;
      }

      /* 3枚引き：絶対に重ならないサイズ設計（3枚=各1/3幅） */
      .cardsGrid.three {
        gap: 8px !important;
      }

      /* 画像をvw基準で固定（画面幅に対して常に収まる） */
      .cardsGrid.three .cardImg {
        width: 28vw !important;
        /* ← ここを 26〜30 で調整 */
        max-width: 28vw !important;
      }

     

    /* =====================================
   📱 Mobileでも3枚横並びを守る（重なり解消）
   ===================================== */
    @media (max-width: 520px) {

      /* 3列を維持しつつ“はみ出し禁止”の土台 */
      .cardsGrid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
        gap: 8px !important;
        align-items: start;
      }

      

      /* 画像は列幅に100%フィット（=重なりの起点を消す） */
      .cardsGrid.three .cardImg {
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
      }

      /* ヘッダーは“縦積み”にして横の突き抜けを防ぐ（横並び表示は維持） */
      .tcardHeader {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 6px !important;
        padding: 10px 10px 8px !important;
      }

      /* バッジも折り返し可に */
      .badge {
        font-size: 11px !important;
        padding: 5px 8px !important;
        max-width: 100% !important;
        white-space: normal !important;
      }

      /* YES/NO ピルが主犯：小さく＆折り返し＆列から出ない */
      .ynRow {
        margin-top: 8px !important;
        gap: 6px !important;
        flex-wrap: wrap !important;
      }

      .yn {
        font-size: 12px !important;
        padding: 6px 8px !important;
        line-height: 1.2 !important;
        max-width: 100% !important;
        white-space: normal !important;

    /* ================================

    #btnDraw {

      padding: 18px 34px !important;

      overflow: visible;

    /* ふわっと光るオーラ（常時） */
    #btnDraw::before {
      content: "";
      position: absolute;
      inset: -18px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 35%, rgba(255, 245, 214, .65), transparent 55%),
        radial-gradient(circle at 70% 65%, rgba(255, 214, 140, .38), transparent 60%);
      filter: blur(10px);
      opacity: .55;
      animation: angelPulse 2.6s ease-in-out infinite;
      pointer-events: none;
    }

    /* “羽感”の左右フレア（画像なしで羽っぽく） */
    #btnDraw::after {
      content: "";
      position: absolute;
      left: -26px;
      right: -26px;
      top: 50%;
      height: 34px;
      transform: translateY(-50%);
      background:
        radial-gradient(26px 18px at 0% 50%, rgba(255, 255, 255, .55), transparent 70%),
        radial-gradient(26px 18px at 100% 50%, rgba(255, 255, 255, .55), transparent 70%),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, .22), transparent);
      filter: blur(1px);
      opacity: .55;
      pointer-events: none;
    }

    /* ホバーで上品に浮く */
    #btnDraw:hover {
      transform: translateY(-1px) scale(1.01);
      filter: saturate(1.03);
      box-shadow:
        0 18px 38px rgba(0, 0, 0, .32),
        0 0 0 1px rgba(255, 255, 255, .22) inset,
        0 0 26px rgba(255, 220, 150, .35);
    }

    /* 押した瞬間に“キラッ” */
    #btnDraw:active {
      transform: translateY(0px) scale(.99);
      box-shadow:
        0 12px 24px rgba(0, 0, 0, .28),
        0 0 0 1px rgba(255, 255, 255, .20) inset,
        0 0 34px rgba(255, 245, 210, .55);
    }

    /* キーボード操作でも光る */
    #btnDraw:focus-visible {
      outline: none;
      box-shadow:
        0 18px 38px rgba(0, 0, 0, .32),
        0 0 0 3px rgba(255, 245, 214, .55),
        0 0 40px rgba(255, 220, 150, .35);

    @keyframes angelPulse {

    function showToast(message, duration = 3000) {
  const container = document.getElementById("toastContainer");
  if (!container) return;

  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = message;
  container.appendChild(el);

  void el.offsetWidth;
  el.classList.add("show");

  setTimeout(() => {
    el.classList.remove("show");
    el.addEventListener("transitionend", () => {
      if (el.parentNode) el.parentNode.removeChild(el);
    });
  }, duration);
}

    function isProbablyMobile() {
  // なるべく安全に「スマホっぽさ」判定
  const ua = navigator.userAgent || "";
  const touch = navigator.maxTouchPoints > 1;
  const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
  return /iPhone|Android|iPad|Mobile/i.test(ua) || (touch && coarse);
}

      if (pickedTheme) return pickedTheme;

          return "金運";

    document.addEventListener("DOMContentLoaded", () => {

    function scrollToResultSmooth() {
      const target = document.getElementById("result");
      if (!target) return;

      const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const behavior = reduce ? "auto" : "smooth";

    

      // 描画が完了してからスクロール（2フレーム待つ）
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try {
            target.scrollIntoView({ behavior, block: "start" });
          } catch (_) {
            // 古い環境フォールバック
            const top = target.getBoundingClientRect().top + window.pageYOffset - 8;
            window.scrollTo({ top, behavior });
          }
        });
      });
    }

    const STORAGE_KEY = "angelique_tarot_csv_rows_v2";
    let cards = [];
    const IS_CREATOR = location.hostname === "localhost" || location.hostname === "127.0.0.1";


    function applyCreatorMode() {
      const creator = document.getElementById("creatorOnly");
      const csvArea = document.getElementById("csvArea");

      if (!IS_CREATOR) {
        if (creator) creator.style.display = "none";
        if (csvArea) csvArea.style.display = "none"; // ★ CSV UI全体を隠す
      }
    }


    const CSV_PATH = new URL("public/data/deck.csv", location.href).toString();

    function guessDelimiterFromText(text) {
      const firstLine = (text || "").split(/\r?\n/)[0] || "";
      const tabCount = (firstLine.match(/\t/g) || []).length;
      const commaCount = (firstLine.match(/,/g) || []).length;
      // タブの方が多ければTSV、それ以外はCSV
      return tabCount > commaCount ? "\t" : ",";
    }

    async function loadBundledCsv() {
      console.log("loadBundledCsv called");
      setStatus("同梱CSVを読み込み中...");
      console.log("CSV_PATH =", CSV_PATH);

      try {
        const res = await fetch(CSV_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error(`fetch failed: ${res.status} ${res.statusText}`);
        const text = await res.text();

        const delim = guessDelimiterFromText(text);
        console.log("guessed delimiter =", JSON.stringify(delim));

        const results = Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          delimiter: delim
        });


        // ===== Column1〜 行を自動スキップする =====
        if (results.meta?.fields?.[0]?.toLowerCase() === "column1") {
          console.log("Dummy header detected. Re-parsing CSV...");
          results.data.shift();              // ダミー行を捨てる
        }
        // ========================================

        console.log("Papa meta.fields:", results.meta?.fields);
        console.log("First row sample:", results.data?.[0]);

        const rows = (results.data || [])
          .map(normalizeRow)
          .filter(r => r && r.id);


        console.log("normalized rows:", rows.length, rows[0]);

        if (!rows.length) {
          setStatus("同梱CSVの読み込みはできたが、id が取れません（ヘッダー名/区切りの可能性）。");
          return;
        }

        if (!validateCards(rows)) {
          setStatus("同梱CSVの必須列（id,name_ja,name_en,image）が不足しています。");
          return;
        }

        cards = rows;
setDeckInfo();
setStatus(`同梱CSV 読み込み完了：${cards.length}枚。引けます。`);
showReady();
} catch (e) {
  console.error(e);
  setStatus("同梱CSVの読み込みに失敗しました（Console参照）。");
  showToast("同梱CSVの読み込みに失敗しました。Consoleを確認してください。", 5000);
}
}

function showReady() {

function boot() {

document.addEventListener("DOMContentLoaded", boot);

    function pick(row, key) {
      // 完全一致
      if (row[key] != null) return row[key];

      // trim/BOMを無視して一致させる
      const want = normalizeKey(key);
      const hit = Object.keys(row).find(k => normalizeKey(k) === want);
      return hit ? row[hit] : "";
    }

    function normalizeKey(s) {
      return (s ?? "")
        .toString()
        .replace(/^\uFEFF/, "")
        .trim()
        .toLowerCase();
    }





    function pickAny(row, candidates) {
      for (const c of candidates) {
        const v = pick(row, c);
        if (v != null && String(v).trim() !== "") return String(v).trim();
      }
      return "";
    }



    function normalizeImagePath(s) {
      return (s ?? "")
        .toString()
        .replace(/^\uFEFF/, "")
        .trim()
        .replace(/^\/+/, "")
        .replace(/\\/g, "/");   // Windowsの \ を / に
    }

    function normalizeRow(row) {
      // キー正規化（BOM/空白/大小）
      const norm = (s) => (s ?? "").toString().replace(/^\uFEFF/, "").trim().toLowerCase();

      // row から key を大小/BOM無視で取る
      const get = (key) => {
        const want = norm(key);
        const hit = Object.keys(row).find(k => norm(k) === want);
        return hit ? String(row[hit] ?? "").trim() : "";
      };

      // 1) 通常ヘッダー（id, arcana, ... image）で来た場合
      const idNormal = get("id");
      if (idNormal) {
        // ヘッダー行が混じる保険
        if (idNormal.toLowerCase() === "id") return null;

        return {
          id: idNormal,
          arcana: get("arcana"),
          suit: get("suit"),
          number: get("number"),
          name_ja: get("name_ja"),
          name_en: get("name_en"),
          element: get("element"),
          polarity: get("polarity"),
          yes_no_upright: get("yes_no_upright"),
          yes_no_reversed: get("yes_no_reversed"),
          timing: get("timing"),
          themes: get("themes"),
          keywords_upright: get("keywords_upright"),
          keywords_reversed: get("keywords_reversed"),
          core_upright: get("core_upright"),
          interpretation_upright: get("interpretation_upright"),
          angel_upright: get("angel_upright"),
          action_upright: get("action_upright"),
          core_reversed: get("core_reversed"),
          interpretation_reversed: get("interpretation_reversed"),
          angel_reversed: get("angel_reversed"),
          action_reversed: get("action_reversed"),
          image: normalizeImagePath(get("image")),
        };
      }

      // Column形式は使わない
      return null;
    } // ← これが必要


    function validateCards(list) {
      // id さえあればOK（imageは無くても動く）
      const bad = list.find(r => !r.id);
      return !bad;
    }



    function onPickFile() {
      const file = elFile.files?.[0];
      if (!file) return;

      setStatus("CSVを読み込み中...");

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = reader.result?.toString() || "";

    function cardImageUrl(image) {
  let raw = (image ?? "").toString().trim();
  if (!raw) return "public/cards/back.webp"; // back.pngしか無いなら back.png に

  raw = raw
    .replace(/^\uFEFF/, "")
    .replace(/^"+|"+$/g, "")
    .replace(/^'+|'+$/g, "")
    .replace(/^\/+/, "")
    .replace(/\\/g, "/");

  // すでに絶対URLならそのまま
  if (/^https?:\/\//i.test(raw)) return raw;

  // 拡張子が無ければ webp を付ける（重要）
  if (!/\.(webp|png|jpg|jpeg)$/i.test(raw)) raw += ".webp";

  return encodeURI("public/cards/" + raw);
}


    function handleCardImgError(img) {
      const tried = parseInt(img.dataset.tried || "0", 10);

      // まず、元の src から「拡張子だけ」差し替えて試す
      const src = img.getAttribute("src") || "";
      const base = src.replace(/\.(webp|png|jpg|jpeg)(\?.*)?$/i, ""); // 末尾拡張子を除去
      const query = (src.match(/(\?.*)$/) || [""])[0];

      const exts = ["webp", "png", "jpg", "jpeg"];

      // すでに back.png なら終了（無限ループ防止）
      if (src.includes("back.png")) return;

      if (tried < exts.length) {
        img.dataset.tried = String(tried + 1);
        img.src = `${base}.${exts[tried]}${query}`;
        return;
      }
      console.warn("[MISSING IMAGE]", {
        alt: img.alt,
        lastTried: src,
        base
      });

      // 最後の砦：裏面
      img.src = "public/cards/back.png";
    }

    /* =========================
   Four Pillars (Simplified) -> Five Elements
   - year boundary: approx LiChun (Feb 4)
   - month: approx solar month mapping (fixed ranges)
   - day: sexagenary by JDN
   - hour: optional (time)
   ========================= */

const STEMS = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const BRANCHES = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

// 五行：天干
const STEM_TO_ELEM = {
  "甲":"木","乙":"木",
  "丙":"火","丁":"火",
  "戊":"土","己":"土",
  "庚":"金","辛":"金",
  "壬":"水","癸":"水",
};
function normalizeDateInput(v){
  const s = (v || "").toString().trim();
  if (!s) return "";
  // 1980/04/06 や 1980.04.06 も吸収して YYYY-MM-DD に寄せる
  const m = s.match(/^(\d{4})[\/\.\-](\d{1,2})[\/\.\-](\d{1,2})$/);
  if (m) {
    const Y = m[1];
    const M = String(m[2]).padStart(2,"0");
    const D = String(m[3]).padStart(2,"0");
    return `${Y}-${M}-${D}`;
  }
  // type="date" は元々 YYYY-MM-DD のはずなのでそれはそのまま通す
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  return ""; // 変な文字列は空扱い（計算しない）
}

function normalizeTimeInput(v){
  const s = (v || "").toString().trim();
  if (!s) return "";
  // "1545" -> "15:45" も許す
  const m = s.match(/^(\d{1,2}):?(\d{2})$/);
  if (!m) return "";
  const hh = String(m[1]).padStart(2,"0");
  const mm = String(m[2]).padStart(2,"0");
  return `${hh}:${mm}`;
}
// 地支→（蔵干）を簡易配分（重み付き）
// 例：子=癸(100)、丑=己60/癸30/辛10 など
const BRANCH_HIDDEN = {
  "子":[["癸",1.00]],
  "丑":[["己",0.60],["癸",0.30],["辛",0.10]],
  "寅":[["甲",0.60],["丙",0.25],["戊",0.15]],
  "卯":[["乙",1.00]],
  "辰":[["戊",0.60],["乙",0.25],["癸",0.15]],
  "巳":[["丙",0.60],["庚",0.25],["戊",0.15]],
  "午":[["丁",0.70],["己",0.30]],
  "未":[["己",0.60],["丁",0.25],["乙",0.15]],
  "申":[["庚",0.60],["壬",0.25],["戊",0.15]],
  "酉":[["辛",1.00]],
  "戌":[["戊",0.60],["辛",0.25],["丁",0.15]],
  "亥":[["壬",0.70],["甲",0.30]],
};

// 年干→寅月の月干（五虎遁の起点）
const YEAR_STEM_TO_TIGER_MONTH_STEM = {
  "甲":"丙","己":"丙",
  "乙":"戊","庚":"戊",
  "丙":"庚","辛":"庚",
  "丁":"壬","壬":"壬",
  "戊":"甲","癸":"甲",
};

// 月支（寅=1）を得たら、寅月の月干から順に進める
function monthStemFrom(yearStem, monthBranch){
  const startStem = YEAR_STEM_TO_TIGER_MONTH_STEM[yearStem] || "丙"; // 寅月の月干
  const startIndex = STEMS.indexOf(startStem);
  const mIndex = BRANCHES.indexOf(monthBranch);
  const tigerIndex = BRANCHES.indexOf("寅");
  const offset = (mIndex - tigerIndex + 12) % 12; // 寅から何ヶ月進んだか
  return STEMS[(startIndex + offset) % 10];
}

// 簡易：節入りの厳密計算はせず、月の範囲で月支を推定（立春＝2/4起点）
function approxMonthBranch(y, m, d){
  // おおよその節入り境界（日本向けのざっくり）
  // 寅:2/4-3/5, 卯:3/6-4/4, 辰:4/5-5/5, 巳:5/6-6/5, 午:6/6-7/6,
  // 未:7/7-8/7, 申:8/8-9/7, 酉:9/8-10/7, 戌:10/8-11/6, 亥:11/7-12/6,
  // 子:12/7-1/5, 丑:1/6-2/3
  const mmdd = m*100 + d;
  if (mmdd >= 204 && mmdd <= 305) return "寅";
  if (mmdd >= 306 && mmdd <= 404) return "卯";
  if (mmdd >= 405 && mmdd <= 505) return "辰";
  if (mmdd >= 506 && mmdd <= 605) return "巳";
  if (mmdd >= 606 && mmdd <= 706) return "午";
  if (mmdd >= 707 && mmdd <= 807) return "未";
  if (mmdd >= 808 && mmdd <= 907) return "申";
  if (mmdd >= 908 && mmdd <= 1007) return "酉";
  if (mmdd >= 1008 && mmdd <= 1106) return "戌";
  if (mmdd >= 1107 && mmdd <= 1206) return "亥";
  if (mmdd >= 1207 || mmdd <= 105) return "子";
  return "丑"; // 1/6-2/3
}

// 立春（2/4）以前は前年扱い（簡易）
function approxYearForFourPillars(y, m, d){
  const mmdd = m*100 + d;
  if (mmdd < 204) return y - 1;
  return y;
}

// JDN（ユリウス日）計算
function toJdn(y, m, d){
  // Gregorian calendar
  const a = Math.floor((14 - m) / 12);
  const y2 = y + 4800 - a;
  const m2 = m + 12*a - 3;
  return d + Math.floor((153*m2 + 2)/5) + 365*y2 + Math.floor(y2/4) - Math.floor(y2/100) + Math.floor(y2/400) - 32045;
}

// ====== Day Ganzhi offset calibration ======
// アンカー: 1980-04-06 は「乙亥」想定（あなたが提示した基準）
function findDayOffsetFor(y, m, d, targetStem, targetBranch){
  const jdn = toJdn(y, m, d);
  for (let off = 0; off < 60; off++){
    const idx = (jdn + off) % 60;
    const stem = STEMS[idx % 10];
    const branch = BRANCHES[idx % 12];
    if (stem === targetStem && branch === targetBranch) return off;
  }
  return null;
}

// ここで offset を確定（見つからなければ旧値49を使う）
const DAY_OFFSET = (()=>{
  const off = findDayOffsetFor(1980, 4, 6, "乙", "亥");
  return (off == null) ? 49 : off;
})();

// 日干支（60干支）: JDN基準から算出
function dayGanzhi(y,m,d){
  const jdn = toJdn(y,m,d);
  const idx = (jdn + DAY_OFFSET) % 60;
  const stem = STEMS[idx % 10];
  const branch = BRANCHES[idx % 12];
  return { stem, branch };
}

// 年干支（簡易）：1984=甲子を基準に
function yearGanzhi(y){
  const base = 1984; // 甲子
  const diff = y - base;
  const idx = (diff % 60 + 60) % 60;
  return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

// 時支（任意）
function hourBranchFromTime(timeStr){
  if (!timeStr) return null;
  const [hh, mm] = timeStr.split(":").map(n => parseInt(n,10));
  if (Number.isNaN(hh)) return null;
  // 子=23-0, 丑=1-2, ... 2時間刻み
  // 23:00-00:59 => 子
  const h = hh;
  const index = Math.floor(((h + 1) % 24) / 2); // 23->0, 0->0, 1->1...
  return BRANCHES[index];
}

// 日干から時干を出す（五鼠遁の起点）
function hourStemFromDayStem(dayStem, hourBranch){
  if (!hourBranch) return null;
  // 甲己日: 甲子, 乙庚日: 丙子, 丙辛日: 戊子, 丁壬日: 庚子, 戊癸日: 壬子
  const startMap = {
    "甲":"甲","己":"甲",
    "乙":"丙","庚":"丙",
    "丙":"戊","辛":"戊",
    "丁":"庚","壬":"庚",
    "戊":"壬","癸":"壬",
  };
  const startStem = startMap[dayStem] || "甲"; // 子時の時干
  const startIndex = STEMS.indexOf(startStem);
  const bIndex = BRANCHES.indexOf(hourBranch);
  const ziIndex = BRANCHES.indexOf("子");
  const offset = (bIndex - ziIndex + 12) % 12;
  return STEMS[(startIndex + offset) % 10];
}

// 五行スコア（天干=強め、地支蔵干=合算）
// ざっくり：干=1.0、支（蔵干合計）=1.0、4柱で最大8前後のイメージ
function calcFiveElements({ yStem,yBranch, mStem,mBranch, dStem,dBranch, hStem,hBranch }){
  const score = { "木":0, "火":0, "土":0, "金":0, "水":0 };

  const addStem = (s, w=1.0)=>{
    if (!s) return;
    const e = STEM_TO_ELEM[s];
    if (e) score[e] += w;
  };
  const addBranch = (b, w=1.0)=>{
    if (!b) return;
    const hidden = BRANCH_HIDDEN[b];
    if (!hidden) return;
    for (const [hs, ratio] of hidden){
      addStem(hs, w * ratio);
    }
  };

  // 天干（各1）
  addStem(yStem, 1.0); addStem(mStem, 1.0); addStem(dStem, 1.0);
  if (hStem) addStem(hStem, 1.0);

  // 地支（各1）
  addBranch(yBranch, 1.0); addBranch(mBranch, 1.0); addBranch(dBranch, 1.0);
  if (hBranch) addBranch(hBranch, 1.0);

  return score;
}

function toDots(v){
  // 見た目のための丸め：0〜3を中心に
  const n = Math.max(0, Math.min(5, Math.round(v)));
  return "●".repeat(n) + "○".repeat(Math.max(0, 5-n));
}

function pickStrongWeak(score){
  const entries = Object.entries(score);
  entries.sort((a,b)=>b[1]-a[1]);
  const strong = entries[0];
  const weak = entries[entries.length-1];
  return { strong, weak };
}

  const score = calcFiveElements({

      }
    }

    function fallbackCopyText(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      // 表示領域外に
      textArea.style.position = "fixed";
      textArea.style.top = "-999999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try {
        const successful = document.execCommand('copy');
        if (successful) showToast("コピーしました");
        else showToast("コピーに失敗しました");
      } catch (err) {
        console.error('Fallback copy fail', err);
        showToast("コピーに失敗しました");
      }
      document.body.removeChild(textArea);
    }

    async function shareResultText() {
      const text = getResultPlainText();
      if (!text) return;

      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Angelique Tarot Reading',
            text: text
          });
          showToast("シェアしました！");
        } catch (err) {
          console.error("Share failed or was cancelled:", err);
          // 失敗またはキャンセルされた場合は確実にクリップボードコピーへ
          copyResultText();
        }
      } else {
        // フォールバック: コピー
        copyResultText();
      }
    }

    // --- Share Image (Canvas) ---
    async function shareResultImage() {
  const canvas = document.getElementById("shareCanvas");
  if (!canvas) { showToast("Canvasが見つかりません"); return; }

  const ctx = canvas.getContext("2d");
  if (!ctx) { showToast("Canvas描画に失敗しました"); return; }

  // 1. 背景描画 (暗いトーン)
  ctx.fillStyle = "#11111d";
  ctx.fillRect(0, 0, 1080, 1080);

  // 上部のグラデーション
  let grad = ctx.createLinearGradient(0, 0, 0, 400);
  grad.addColorStop(0, "rgba(245, 230, 179, 0.15)");
  grad.addColorStop(1, "rgba(17, 17, 29, 0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1080, 1080);

  // 2. 金色の枠線
  ctx.strokeStyle = "rgba(214, 178, 94, 0.4)";
  ctx.lineWidth = 4;
  ctx.strokeRect(40, 40, 1000, 1000);
  ctx.strokeStyle = "rgba(214, 178, 94, 0.15)";
  ctx.lineWidth = 1;
  ctx.strokeRect(50, 50, 980, 980);

  // 3. タイトル
  ctx.fillStyle = "#f5e6b3"; // pale gold
  ctx.font = "40px 'Cinzel', serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText("Angelique Tarot", 540, 80);

  const today = new Date();
  const dateStr = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, "0")}.${String(today.getDate()).padStart(2, "0")}`;
  ctx.font = "24px 'Cinzel', serif";
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.fillText(dateStr, 540, 130);

  // 4. 画像の描画 (現在表示されているカード画像を集める)
  const imgs = document.querySelectorAll("#result .cardImg");
  if (imgs.length === 0) {
    showToast("カード画像がありません");
    return;
  }

  const drawMode = document.querySelector('input[name="drawMode"]:checked')?.value || "1";
  const count = (String(drawMode) === "3") ? 3 : 1;

  const cardW = count === 1 ? 300 : 240;
  const cardH = count === 1 ? 480 : 384;
  const startY = 220;

  const loadImg = (src, isReversed) => new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve({ img, isReversed, ok: true });
    img.onerror = () => resolve({ img: null, isReversed, ok: false });
    img.src = src;
  });

  const promises = [];
  const cardElements = document.querySelectorAll("#result .tcard");
  cardElements.forEach(cel => {
    const imgEl = cel.querySelector("img");
    if (imgEl) {
      const isReversed = cel.querySelector(".badge")?.classList.contains("rev") || imgEl.classList.contains("reversed");
      promises.push(loadImg(imgEl.src, isReversed));
    }
  });

  const loadedImgs = await Promise.all(promises);
  const validImgs = loadedImgs.filter(item => item.ok);

  if (validImgs.length === 1) {
    drawCardOnCanvas(ctx, validImgs[0], 540 - cardW / 2, startY, cardW, cardH);
  } else if (validImgs.length === 3) {
    const gap = 40;
    const totalW = cardW * 3 + gap * 2;
    const startX = 540 - totalW / 2;
    drawCardOnCanvas(ctx, validImgs[0], startX, startY, cardW, cardH);
    drawCardOnCanvas(ctx, validImgs[1], startX + cardW + gap, startY, cardW, cardH);
    drawCardOnCanvas(ctx, validImgs[2], startX + (cardW + gap) * 2, startY, cardW, cardH);
  } else {
    showToast("画像の読み込みに失敗しました");
    return;
  }

  // 5. 結論テキスト
  const summaryTitleEl = document.querySelector("#result .summaryTitle");
  if (summaryTitleEl) {
    ctx.font = "bold 28px 'Noto Serif JP', serif";
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillText(summaryTitleEl.innerText.replace("【結論】", ""), 540, startY + cardH + 60);
  }

  // Footer
  ctx.font = "20px 'Noto Serif JP', serif";
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillText("Search 'Angelique Tarot' to pull your own cards.", 540, 980);

    // 6. 出力（PNG化して、スマホ=共有 / PC=モーダル表示）
  canvas.toBlob(async (blob) => {
    if (!blob) {
      showToast("画像の生成に失敗しました");
      fallbackCopyText(getResultPlainText());
      return;
    }

    const file = new File([blob], "reading.png", { type: "image/png" });

    // ✅ PCは共有シートを使わず、モーダルで画像を見せる
    if (!isProbablyMobile()) {
      openImageFallbackFromBlob(blob);
      return;
    }

    // ✅ スマホは Share API が使えるなら使う
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Angelique Tarot Reading",
          text: "私のタロットリーディング結果です #AngeliqueTarot"
        });
        showToast("画像をシェアしました！");
      } catch (err) {
        console.error("Image Share failed or cancelled:", err);
        // キャンセル時はモーダルへ
        openImageFallbackFromBlob(blob);
      }
    } else {
      openImageFallbackFromBlob(blob);
    }
  }, "image/png");
}

// ✅ ここは shareResultImage の「外」に置く（超重要）
function openImageFallbackFromBlob(blob) {
  showToast("画像を表示しました。右クリック/長押しで保存できます", 3500);

  const modal = document.getElementById("shareModal");
  const imgEl = document.getElementById("shareModalImg");
  const dl = document.getElementById("shareModalDownload");
  const openBtn = document.getElementById("shareModalOpen");
  const closeBtn = document.getElementById("shareModalClose");

  if (!modal || !imgEl || !dl || !closeBtn || !openBtn) {
    fallbackCopyText(getResultPlainText());
    showToast("画像表示UIが見つかりません。テキストをコピーしました。", 4000);
    return;
  }

  const url = URL.createObjectURL(blob);
  imgEl.src = url;
  dl.href = url;
  openBtn.href = url;

  modal.style.display = "block";

  const close = () => {
    modal.style.display = "none";
    try { URL.revokeObjectURL(url); } catch {}
    closeBtn.removeEventListener("click", close);
    modal.removeEventListener("click", onBg);
  };

  const onBg = (e) => {
    if (e.target === modal) close();
  };

  closeBtn.addEventListener("click", close);
  modal.addEventListener("click", onBg);
}

 

    function drawCardOnCanvas(ctx, item, x, y, w, h) {
      if (!item || !item.img) return;
      ctx.save();

      // 影
      ctx.shadowColor = "rgba(0,0,0,0.8)";
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 10;

      if (item.isReversed) {
        // 逆位置なら回転
        ctx.translate(x + w / 2, y + h / 2);
        ctx.rotate(Math.PI);
        ctx.drawImage(item.img, -w / 2, -h / 2, w, h);
      } else {
        ctx.drawImage(item.img, x, y, w, h);
      }
      ctx.restore();
    }
