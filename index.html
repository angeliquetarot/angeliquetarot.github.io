<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angelique Tarot (CSV版)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
  --bg: #0c0c18;
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.72);
  --accent: #f0abfc;
  --accent2: #a5b4fc;
  --warn: #fde68a;
}

/* base */
*{ box-sizing:border-box; }
html{ font-size: 18px; }
body{
  margin:0;
  min-height:100vh;
  color: var(--text);
  font-family:"Shippori Mincho", serif;
  padding-inline: 16px;
  background:
    radial-gradient(120% 100% at 50% 0%, rgba(249,224,138,.10), rgba(0,0,0,0) 60%),
    radial-gradient(90% 80% at 85% 18%, rgba(165,180,252,.10), rgba(0,0,0,0) 62%),
    linear-gradient(to bottom, #11111d 0%, #15152b 60%, #0c0c18 100%);
}
h1,h2,.shareTitle,.summaryTitle{
  font-family:"Cinzel","Shippori Mincho",serif;
  letter-spacing:.04em;
}

.app{ width:min(1100px,100%); margin-inline:auto; }

/* panels */
.panel,.stage,.summaryCard{
  background: rgba(20,16,30,.62);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 22px 64px rgba(0,0,0,.55),
              inset 0 0 0 1px rgba(255,255,255,.10);
  color: rgba(255,255,255,.92);
}

/* chips/buttons */
.chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  padding: 10px 12px;
  border-radius: 999px;
  cursor:pointer;
}
.chip span{ color: var(--muted); }

button{
  border:0;
  cursor:pointer;
  padding:12px 14px;
  border-radius:14px;
  color: rgba(40,28,10,.92);
  background: linear-gradient(135deg,#f6e7c6 0%,#efd39a 28%,#d7b36a 55%,#f3e0b8 100%);
  font-weight:900;
  letter-spacing:.06em;
}

/* draw bar */
.drawBar{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin:14px 0 10px;
  position:relative;
  z-index:50;
}
.drawModeInline{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}
#btnDraw{ display:inline-flex; z-index:60; }

/* card layout */
.cardsGrid{
  width: min(1100px, 100%);
  margin: 18px auto 0;
  padding-inline: 8px;
  display: grid;
  gap: 14px;
  align-items: start;
}
.cardsGrid.single{
  grid-template-columns: minmax(0, 420px);
  justify-content: center;
}
.cardsGrid.three{
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.cardsGrid.three > .tcard{ min-width:0; }

@media (max-width: 980px){
  .cardsGrid.three{ grid-template-columns: repeat(2, minmax(0,1fr)); }
}
@media (max-width: 640px){
  .cardsGrid.three{ grid-template-columns: 1fr; }
}

.tcard{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.10);
  overflow:hidden;
}

.tcardHeader{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding: 12px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.18);
}
.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
  white-space:nowrap;
}
.badge.up{ border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.12); }
.badge.rev{ border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.12); }

.tcardVisual{ padding: 10px; }
.cardImg{
  display:block;
  width:100%;
  height:auto;
  max-width:100%;
  border-radius: 16px;
  object-fit: cover;
}
.cardImg.reversed{ transform: rotate(180deg); }

.tcardBody{
  padding: 0 12px 12px;
  color: rgba(255,255,255,.90);
  font-size: 13px;
  line-height: 1.7;
}

/* mobile containment */
@media (max-width: 520px){
  .tcardHeader{
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
    padding: 10px 10px 8px;
  }
  .badge{ font-size: 11px; padding: 5px 8px; white-space: normal; }
}
/* =========================
   🂠 Card Back (simple + reliable)
   - 既存 .tcard / .tcardVisual を壊さず背面を出す
   ========================= */

.tcardVisual{
  position: relative; /* 必須 */
}

/* 背面画像（最背面に敷く） */
.cardBack{
  position: absolute;
  inset: 10px;                 /* 角飾り背景と合わせる */
  border-radius: 16px;
  background:
    radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,.10), rgba(0,0,0,0) 55%),
    radial-gradient(120% 120% at 70% 80%, rgba(249,224,138,.10), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.25)),
    url("public/cards/back.png") center / cover no-repeat; /* ←ここをあなたの背面に */
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 18px 46px rgba(0,0,0,.42);
  z-index: 0;
  pointer-events: none;
}

/* 表の画像は背面より前に */
.tcardVisual .cardImg{
  position: relative;
  z-index: 1;
}



/* 表面・裏面を同じ枠で重ねる */
.tcardVisual{
  position: relative;
}

.cardBackImg{
  position:absolute;
  inset: 0;
  width: 100%;
  height: auto;
  border-radius: 16px;
  object-fit: cover;
  opacity: 1;
}

.cardImg{
  position: relative;
  z-index: 1;
}
/* =========================================
   STEP1: 結果を「第一層（結論）」+「折りたたみ風」に（CSSのみ）
   対象: #result 内の .angel-summary
   ========================================= */

/* 結果全体の余白を少し整える（任意） */
#result{
  margin-top: 14px;
}

/* 4枠全体のコンテナ */
.angel-summary{
  margin: 14px 0 10px;
  padding: 14px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.12);
  box-shadow: 0 18px 60px rgba(0,0,0,.35);
  position: relative;
  overflow: hidden; /* 折りたたみ風のグラデに必要 */
}

/* 各ブロック */
.angel-summary .angel-block{
  padding: 12px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.04);
}

/* ラベル（結論/理由/今日は/一歩） */
.angel-summary .angel-label{
  font-family: "Cinzel","Shippori Mincho",serif;
  letter-spacing: .06em;
  font-size: 12px;
  color: rgba(255,255,255,.70);
  margin-bottom: 6px;
}

/* 本文 */
.angel-summary .angel-text{
  font-size: 0.98rem;
  line-height: 1.9;
  color: rgba(255,255,255,.90);
}

/* ====== 第一層（結論）を“刺す” ====== */
.angel-summary .angel-conclusion{
  border-color: rgba(249,224,138,.28);
  background: linear-gradient(180deg, rgba(249,224,138,.14), rgba(255,255,255,.05));
  box-shadow: 0 14px 46px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.08);
}

.angel-summary .angel-conclusion .angel-label{
  color: rgba(249,224,138,.92);
}

.angel-summary .angel-conclusion .angel-text{
  font-size: 1.05rem;
  font-weight: 700;
  color: rgba(255,255,255,.96);
}

/* ====== 第二層（理由/今日は/一歩）を“折りたたみ風に沈める” ======
   ※ JS/HTMLを触らないため「開閉」はしない。まずは情報量を“隠す見た目”に寄せる。
*/
.angel-summary .angel-block:not(.angel-conclusion){
  margin-top: 10px;
  opacity: .72;
  filter: saturate(.95);
}

/* 2つ目以降を少し小さくして密度を下げる */
.angel-summary .angel-block:not(.angel-conclusion) .angel-text{
  font-size: 0.95rem;
  color: rgba(255,255,255,.80);
}

/* 下に向かってフェード（折りたたみの気配） */
.angel-summary::after{
  content:"";
  position:absolute;
  left:0; right:0; bottom:0;
  height: 70px;
  pointer-events:none;
  background: linear-gradient(180deg, rgba(12,12,24,0), rgba(12,12,24,.55));
}

/* “続きを読む”の幽霊ボタン（見た目だけ / STEP2で本物にする） */
.angel-summary::before{
  content:"続きを読む（詳細）";
  position:absolute;
  right: 14px;
  bottom: 14px;
  font-size: 12px;
  color: rgba(255,255,255,.72);
  padding: 8px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.20);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
/* =========================
   STEP A: 3枚引きは「カード名 + 画像」だけにする（情報過多を止める）
   JS不変 / renderCard不変
   ========================= */
.cardsGrid.three .tcardBody,
.cardsGrid.three .ynRow{
  display:none;
}
/* ====== FIX: deck(トップの裏面)を必ず表示 ====== */
#shuffleArea .deck{
  width: 220px;
  height: 340px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.18);
  background:
    radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,.10), rgba(0,0,0,0) 55%),
    radial-gradient(120% 120% at 70% 80%, rgba(249,224,138,.10), rgba(0,0,0,0) 60%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.25)),
    url("/public/cards/back.png") center / cover no-repeat;
  box-shadow: 0 18px 46px rgba(0,0,0,.45);
}/* ====== FIX: Birth panel layout restore (minimal) ====== */
.appHeader{
  margin: 16px 0 8px;
}
.title p{
  margin: 6px 0 0;
  color: rgba(255,255,255,.72);
}

.birthPanel .panelTitle{
  margin: 0 0 10px;
  font-size: 18px;
}

.birthGrid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

@media (max-width: 740px){
  .birthGrid{ grid-template-columns: 1fr; }
}

.birthBlock{ display:flex; flex-direction:column; gap:6px; }
.birthLabel{
  font-size: 12px;
  color: rgba(255,255,255,.72);
}

.birthInput{
  width:100%;
  padding: 12px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(0,0,0,.18);
  color: rgba(255,255,255,.92);
  outline: none;
}
.birthInput:focus{
  border-color: rgba(249,224,138,.35);
  box-shadow: 0 0 0 3px rgba(249,224,138,.10);
}

.birthHint{
  margin: 10px 0 0;
  font-size: 13px;
  color: rgba(255,255,255,.70);
}

.status{
  margin: 10px 0;
  font-size: 13px;
  color: rgba(255,255,255,.78);
}

.divider{
  height: 1px;
  background: rgba(255,255,255,.10);
  margin: 14px 0;
}/* =========================
   STEP A: 3枚引きは「カード名 + 画像」中心にして情報過多を止める
   ========================= */
.cardsGrid.three .tcardBody,
.cardsGrid.three .ynRow{
  display:none;
}

/* 3枚引き時：ヘッダの文字も少しだけ締める（任意・安全） */
.cardsGrid.three .tcardHeader{
  padding-bottom: 8px;
}
.cardsGrid.three .tcardHeader .sub{
  opacity: .70;
}
/* =========================================
   Luxury / Floating card polish (CSS only)
   ========================================= */

/* カード全体：影・浮遊 */
.tcard{
  border-radius: 20px;
  background: rgba(0,0,0,.14);
  box-shadow:
    0 22px 70px rgba(0,0,0,.55),
    0 2px 0 rgba(255,255,255,.06) inset;
  transform: translateZ(0);
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}

/* ふわっと持ち上がる（PC） */
@media (hover:hover){
  .tcard:hover{
    transform: translateY(-6px);
    box-shadow:
      0 30px 90px rgba(0,0,0,.62),
      0 2px 0 rgba(255,255,255,.08) inset;
    border-color: rgba(249,224,138,.22);
  }
}

/* ヘッダ：ガラス感を少しだけ上品に */
.tcardHeader{
  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.12));
  border-bottom: 1px solid rgba(255,255,255,.10);
}

/* 画像：枠に奥行き */
.tcardVisual{
  padding: 12px;
}
.cardImg, .cardBackImg{
  border-radius: 16px;
  box-shadow:
    0 18px 46px rgba(0,0,0,.45),
    0 0 0 1px rgba(255,255,255,.10);
}

/* 3枚引き：カードが“べた張り”に見えないよう間隔と影を強化 */
.cardsGrid.three{
  gap: 18px;
}
.cardsGrid.three .tcard{
  box-shadow:
    0 26px 86px rgba(0,0,0,.60),
    0 2px 0 rgba(255,255,255,.06) inset;
}

/* ほんの粒子（カード上の微光） */
.tcard::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(80% 60% at 30% 10%, rgba(249,224,138,.10), rgba(0,0,0,0) 55%),
    radial-gradient(70% 60% at 80% 30%, rgba(165,180,252,.10), rgba(0,0,0,0) 60%);
  opacity:.9;
}
.tcard{ position: relative; overflow:hidden; }

/* =========================================
   Deck glow: stronger + slower + breathing
   ========================================= */

@keyframes deckFloat {
  0%   { transform: translateY(0) rotateX(0deg); }
  50%  { transform: translateY(-12px) rotateX(1.2deg); }
  100% { transform: translateY(0) rotateX(0deg); }
}



/* “ぽわっ” を視覚的に分かりやすくする外側ハロー（上品） */
#shuffleArea .deck::before{
  content:"";
  position:absolute;
  inset:-24px;
  border-radius: 28px;
  pointer-events:none;
  background: radial-gradient(55% 45% at 50% 45%, rgba(249,224,138,.55), rgba(0,0,0,0) 70%);
  filter: blur(18px);
  opacity: 0;
  transform: translateZ(0);
}



/* 安っぽい“スイープ”が残ってる場合は無効化（保険） */
#btnDraw::after{ display:none !important; }
/* =========================================
   Result Cards: gentle floating + richer depth
   ========================================= */

@keyframes cardDrift {
  0%   { transform: translateY(0) rotateZ(0deg); }
  50%  { transform: translateY(-8px) rotateZ(0.2deg); }
  100% { transform: translateY(0) rotateZ(0deg); }
}

/* 立体感を強化 */
.tcard{
  position: relative;
  overflow: hidden;
  box-shadow:
    0 26px 92px rgba(0,0,0,.62),
    0 2px 0 rgba(255,255,255,.06) inset;
  border-color: rgba(255,255,255,.16);
}

/* ふわふわ（常時は弱め） */
#result .tcard{
  animation: cardDrift 4.6s ease-in-out infinite;
}

/* 3枚はズレた波で“生きてる感じ” */
#result .cardsGrid.three .tcard:nth-child(1){ animation-delay: .00s; }
#result .cardsGrid.three .tcard:nth-child(2){ animation-delay: .55s; }
#result .cardsGrid.three .tcard:nth-child(3){ animation-delay: 1.10s; }

/* 上品なハイライト */
.tcard::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background: radial-gradient(70% 45% at 35% 8%, rgba(255,255,255,.10), rgba(0,0,0,0) 60%);
  opacity:.9;
}

/* 動きが苦手な人向け */
@media (prefers-reduced-motion: reduce){
  #result .tcard{ animation: none !important; }
}
/* =========================================
   FIX: Deck center + soft fade-out (breathing)
   ========================================= */

/* shuffleArea を100%幅で中央揃え */
#shuffleArea{
  width: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position: relative;
}

/* fly がレイアウトを押さないようにする（ここが左寄りの主因になりやすい） */
#shuffleArea .fly{
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* デッキ本体：停止時にも“薄い余光”を残して作り物感を消す */
#shuffleArea .deck{
  position: relative;
  margin-inline: auto;

  /* 停止→停止の戻りに余韻を作る（急に消える対策） */
  transition:
    transform 900ms cubic-bezier(.22,1,.36,1),
    box-shadow 1200ms cubic-bezier(.22,1,.36,1),
    filter 1200ms cubic-bezier(.22,1,.36,1);
  will-change: transform, box-shadow, filter;

  /* “完全にゼロ”にしない：薄い余白として残す */
  box-shadow:
    0 26px 90px rgba(0,0,0,.65),
    0 1px 0 rgba(255,255,255,.10) inset,
    0 0 18px rgba(249,224,138,.08);
}

/* ハローの余韻（急に消えない） */
#shuffleArea .deck::before{
  transition:
    opacity 1400ms cubic-bezier(.22,1,.36,1),
    transform 1400ms cubic-bezier(.22,1,.36,1),
    filter 1400ms cubic-bezier(.22,1,.36,1);
}

/* 呼吸を“ゆっくり・優しく”に */
@keyframes deckFloat {
  0%   { transform: translateY(0) rotateX(0deg); }
  50%  { transform: translateY(-10px) rotateX(1.0deg); }
  100% { transform: translateY(0) rotateX(0deg); }
}

@keyframes deckGlow {
  0%   {
    box-shadow:
      0 26px 90px rgba(0,0,0,.65),
      0 1px 0 rgba(255,255,255,.10) inset,
      0 0 18px rgba(249,224,138,.08);
    filter: saturate(1.0);
  }
  50%  {
    box-shadow:
      0 36px 130px rgba(0,0,0,.72),
      0 1px 0 rgba(255,255,255,.12) inset,
      0 0 78px rgba(249,224,138,.40);
    filter: saturate(1.08);
  }
  100% {
    box-shadow:
      0 26px 90px rgba(0,0,0,.65),
      0 1px 0 rgba(255,255,255,.10) inset,
      0 0 18px rgba(249,224,138,.08);
    filter: saturate(1.0);
  }
}

@keyframes haloBreath{
  0%   { opacity: 0; transform: scale(.985); filter: blur(18px); }
  50%  { opacity: .72; transform: scale(1.00); filter: blur(18px); }
  100% { opacity: 0; transform: scale(.985); filter: blur(18px); }
}


/* =========================================
   FIX PACK: 1) glow fade-out  2) pedestal/frame  3) badge UI
   ========================================= */

/* ---------- 1) デッキの“光”を「呼吸＋余韻フェードアウト」にする ---------- */
/* ポイント：opacityは animation で揺らさず、状態で変える（transitionが効く） */

#shuffleArea .deck::before{
  /* 余韻：ここでゆっくり戻す */
  opacity: .12;
  transform: scale(.985);
  filter: blur(20px);
  transition:
    opacity 2200ms cubic-bezier(.22,1,.36,1),
    transform 2200ms cubic-bezier(.22,1,.36,1),
    filter 2200ms cubic-bezier(.22,1,.36,1);
}

/* シャッフル中：強く光る（でも上品に） */
#shuffleArea.shuffling .deck::before{
  opacity: .78;              /* ← “光った”と分かる強さ */
  transform: scale(1.00);
  filter: blur(18px);
}

/* 呼吸は opacity ではなく “わずかなスケール/揺れ” だけにする */
@keyframes haloBreathSoft{
  0%   { transform: scale(.995); }
  50%  { transform: scale(1.005); }
  100% { transform: scale(.995); }
}
#shuffleArea.shuffling .deck::before{
  animation: haloBreathSoft 4.2s cubic-bezier(.45,0,.2,1) infinite;
}

/* deck の光も “ドン消え”しないよう、常時の余光を残しつつ transition を効かせる */
#shuffleArea .deck{
  box-shadow:
    0 26px 90px rgba(0,0,0,.65),
    0 1px 0 rgba(255,255,255,.10) inset,
    0 0 20px rgba(249,224,138,.10);
  transition:
    transform 1400ms cubic-bezier(.22,1,.36,1),
    box-shadow 2400ms cubic-bezier(.22,1,.36,1),
    filter 2400ms cubic-bezier(.22,1,.36,1);
}

/* 既存の deckGlow が残っていると“急に消える”原因になるので無効化（保険） */
#shuffleArea.shuffling .deck{
  animation-name: deckFloat !important; /* deckGlowを強制的に外す */
  animation-duration: 4.2s !important;
  animation-timing-function: cubic-bezier(.45,0,.2,1) !important;
  animation-iteration-count: infinite !important;
}

/* ---------- 2) 結果カードを“台座＋透明フレーム”に載せて高級感 ---------- */
/* tcard自体の影だけだと平面に見えるので、下に“台座影”を追加 */
#result .tcard{
  position: relative;
  border-color: rgba(255,255,255,.16);
}

/* 台座（カードの下にうっすら乗る影） */
#result .tcard::after{
  content:"";
  position:absolute;
  left: 10%;
  right: 10%;
  bottom: -14px;
  height: 22px;
  border-radius: 999px;

    function pick(row, key) {
      // 完全一致
      if (row[key] != null) return row[key];

      // trim/BOMを無視して一致させる
      const want = normalizeKey(key);
      const hit = Object.keys(row).find(k => normalizeKey(k) === want);
      return hit ? row[hit] : "";
    }

    function normalizeKey(s) {
      return (s ?? "")
        .toString()
        .replace(/^\uFEFF/, "")
        .trim()
        .toLowerCase();
    }





    function pickAny(row, candidates) {
      for (const c of candidates) {

      }

    function normalizeImagePath(s) {

      const get = (key) => {
        const want = norm(key);
        const hit = Object.keys(row).find(k => norm(k) === want);
        return hit ? String(row[hit] ?? "").trim() : "";
      };

      // 1) 通常ヘッダー（id, arcana, ... image）で来た場合
      const idNormal = get("id");
      if (idNormal) {
        // ヘッダー行が混じる保険

        return {
          id: idNormal,
          arcana: get("arcana"),
          suit: get("suit"),
          number: get("number"),
          name_ja: get("name_ja"),

          element: get("element"),
          polarity: get("polarity"),
          yes_no_upright: get("yes_no_upright"),

// Stable picker (seeded)
// =========================
function hash32(str){
  // FNV-1a 32bit
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}

/**
 * arr: 配列
 * seed: 文字列（例 "2026-03-02|The World|U|work"）
 */
function pickStable(arr, seed){
  if (!Array.isArray(arr) || arr.length === 0) return "";
  const idx = hash32(String(seed || "seed")) % arr.length;
  return arr[idx];
}

function toShortAction(s, maxLen = 22){

function buildReadableReason({ basePoetic = "", baseExplain = "", closing = "", optionalMetaLines = [] }){
  const clean = (s) => (s ?? "").toString().trim();

  const p = clean(basePoetic);
  const e = clean(baseExplain);
  const c = clean(closing);

  const meta = Array.isArray(optionalMetaLines)
    ? optionalMetaLines.map(clean).filter(Boolean)
    : [];

  // 長文になりすぎるのを軽く抑える（必要なら調整可）
  const shorten = (s, max = 160) => {
    const t = clean(s);
    if (!t) return "";
    if (t.length <= max) return t;
    return t.slice(0, max) + "…";
  };

  // 「理由」なので、詩→説明→締め で一続きにする
  // ※ UI側が white-space: pre-line なら \n が綺麗に効く
  const parts = [
    shorten(p, 120),
    shorten(e, 220),
    ...meta.map(m => shorten(m, 120)),
    shorten(c, 90),
  ].filter(Boolean);

  // 文章が何も無いケースでも落とさない
  if (!parts.length) {
    return "いまは状況を整えるほど、次の流れが見えてくる時です。";
  }

  return parts.join("\n");
}

  if (mmdd >= 1107 && mmdd <= 1206) return "亥";
  if (mmdd >= 1207 || mmdd <= 105) return "子";
  return "丑"; // 1/6-2/3
}

// 立春（2/4）以前は前年扱い（簡易）
function approxYearForFourPillars(y, m, d){
  const mmdd = m*100 + d;
  if (mmdd < 204) return y - 1;
  return y;
}

// JDN（ユリウス日）計算
function toJdn(y, m, d){
  // Gregorian calendar
  const a = Math.floor((14 - m) / 12);
  const y2 = y + 4800 - a;
  const m2 = m + 12*a - 3;
  return d + Math.floor((153*m2 + 2)/5) + 365*y2 + Math.floor(y2/4) - Math.floor(y2/100) + Math.floor(y2/400) - 32045;
}

// ====== Day Ganzhi offset calibration ======
// アンカー: 1980-04-06 は「乙亥」想定（あなたが提示した基準）
function findDayOffsetFor(y, m, d, targetStem, targetBranch){
  const jdn = toJdn(y, m, d);
  for (let off = 0; off < 60; off++){
    const idx = (jdn + off) % 60;
    const stem = STEMS[idx % 10];
    const branch = BRANCHES[idx % 12];
    if (stem === targetStem && branch === targetBranch) return off;
  }
  return null;
}

// ここで offset を確定（見つからなければ旧値49を使う）
const DAY_OFFSET = (()=>{
  const off = findDayOffsetFor(1980, 4, 6, "乙", "亥");
  return (off == null) ? 49 : off;
})();

// 日干支（60干支）: JDN基準から算出
function dayGanzhi(y,m,d){
  const jdn = toJdn(y,m,d);
  const idx = (jdn + DAY_OFFSET) % 60;
  const stem = STEMS[idx % 10];
  const branch = BRANCHES[idx % 12];
  return { stem, branch };
}

// 年干支（簡易）：1984=甲子を基準に
function yearGanzhi(y){
  const base = 1984; // 甲子
  const diff = y - base;
  const idx = (diff % 60 + 60) % 60;
  return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

// 時支（任意）
function hourBranchFromTime(timeStr){
  if (!timeStr) return null;
  const [hh, mm] = timeStr.split(":").map(n => parseInt(n,10));
  if (Number.isNaN(hh)) return null;
  // 子=23-0, 丑=1-2, ... 2時間刻み
  // 23:00-00:59 => 子
  const h = hh;
  const index = Math.floor(((h + 1) % 24) / 2); // 23->0, 0->0, 1->1...
  return BRANCHES[index];
}

// 日干から時干を出す（五鼠遁の起点）
function hourStemFromDayStem(dayStem, hourBranch){
  if (!hourBranch) return null;
  // 甲己日: 甲子, 乙庚日: 丙子, 丙辛日: 戊子, 丁壬日: 庚子, 戊癸日: 壬子
  const startMap = {
    "甲":"甲","己":"甲",
    "乙":"丙","庚":"丙",
    "丙":"戊","辛":"戊",
    "丁":"庚","壬":"庚",
    "戊":"壬","癸":"壬",
  };
  const startStem = startMap[dayStem] || "甲"; // 子時の時干
  const startIndex = STEMS.indexOf(startStem);
  const bIndex = BRANCHES.indexOf(hourBranch);
  const ziIndex = BRANCHES.indexOf("子");
  const offset = (bIndex - ziIndex + 12) % 12;
  return STEMS[(startIndex + offset) % 10];
}

// 五行スコア（天干=強め、地支蔵干=合算）
// ざっくり：干=1.0、支（蔵干合計）=1.0、4柱で最大8前後のイメージ
function calcFiveElements({ yStem,yBranch, mStem,mBranch, dStem,dBranch, hStem,hBranch }){
  const score = { "木":0, "火":0, "土":0, "金":0, "水":0 };

  const addStem = (s, w=1.0)=>{
    if (!s) return;
    const e = STEM_TO_ELEM[s];
    if (e) score[e] += w;
  };
  const addBranch = (b, w=1.0)=>{
    if (!b) return;
    const hidden = BRANCH_HIDDEN[b];
    if (!hidden) return;
    for (const [hs, ratio] of hidden){
      addStem(hs, w * ratio);
    }
  };

  // 天干（各1）
  addStem(yStem, 1.0); addStem(mStem, 1.0); addStem(dStem, 1.0);
  if (hStem) addStem(hStem, 1.0);

  // 地支（各1）
  addBranch(yBranch, 1.0); addBranch(mBranch, 1.0); addBranch(dBranch, 1.0);
  if (hBranch) addBranch(hBranch, 1.0);

  return score;
}

function toDots(v){
  // 見た目のための丸め：0〜3を中心に
  const n = Math.max(0, Math.min(5, Math.round(v)));
  return "●".repeat(n) + "○".repeat(Math.max(0, 5-n));
}

  const entries = Object.entries(score);
  entries.sort((a,b)=>b[1]-a[1]);
  const strong = entries[0];
  const weak = entries[entries.length-1];
  return { strong, weak };
}
