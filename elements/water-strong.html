<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>強い：水（感受性・回復）｜五行｜Angelique Tarot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0c0c18; --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.72);
      --gold: rgba(245,228,170,.95);
      --panel: rgba(20,16,30,.62);
      --border: rgba(255,255,255,.14);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family:"Shippori Mincho",serif; padding:16px;
      background:
        radial-gradient(1200px 700px at 50% -10%, rgba(249,224,138,.14), rgba(0,0,0,0) 60%),
        radial-gradient(900px 700px at 85% 18%, rgba(165,180,252,.10), rgba(0,0,0,0) 62%),
        linear-gradient(to bottom, #0b0b14 0%, #111129 55%, #07070f 100%);
    }
    a{color:var(--gold); text-decoration:none}
    a:hover{color:rgba(255,245,210,1)}
    .app{width:min(900px,100%); margin:0 auto}
    .panel{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px; padding:14px;
      box-shadow: 0 22px 64px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
    }
    h1,h2{font-family:"Cinzel","Shippori Mincho",serif; letter-spacing:.04em}
    h1{font-size:26px; margin:6px 0 8px}
    p{margin:8px 0; color:var(--muted); line-height:1.9}
    .row{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.90);
      min-height:42px;
    }
    .btnPrimary{
      color: rgba(40,28,10,.92);
      background: linear-gradient(135deg,#f6e7c6 0%,#efd39a 28%,#d7b36a 55%,#f3e0b8 100%);
      border:0; font-weight:900; letter-spacing:.06em;
    }
    .box{
      margin-top:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.12);
      border-radius:16px;
      padding:12px;
    }
    .list{margin:8px 0 0; padding-left: 1.2em; color:rgba(255,255,255,.86); line-height:1.85}
    .label{display:inline-block; font-size:12px; opacity:.85; letter-spacing:.12em; margin-bottom:6px}
  </style>
</head>
<body>
  <div class="app">
    <section class="panel">
      <div class="label">五行 / 強い</div>
      <h1>強い：水（感受性・回復）</h1>
     <p>
「水」が強いときは、<br>
感受性や直感が高まっている状態です。<br><br>

人の気持ちを感じ取りやすく、<br>
深く物事を考える力も強くなります。<br><br>

ただし強すぎると、<br>
感情や情報に影響を受けやすくなることがあります。
</p>

      <div class="row">
        <a class="btn btnPrimary" href="../index.html#appStart">カードに戻る</a>
        <a class="btn" href="./index.html">五行トップへ</a>
        <a class="btn" href="./fire-strong.html">強い：水を見る</a>
      </div>
    </section>

    <section class="panel" style="margin-top:14px;">
      <h2 style="margin:0 0 8px;">サイン（出やすい傾向）</h2>
      <div class="box">
        <ul class="list">
          <li>直感がよく当たる  
</li>
          <li>人の感情を感じやすい  
</li>
          <li>静かな時間が好き</li>
        </ul>
      </div>

      <h2 style="margin:14px 0 8px;">整える“一歩”</h2>
      <div class="box">
        <ul class="list">
          <li>一人の時間を確保する  
</li>
          <li>自然や水に触れる  
</li>
          <li>情報を取りすぎない</li>
        </ul>
      </div>

      <h2 style="margin:14px 0 8px;">タロットに反映するコツ</h2>
      <div class="box">
        <p style="margin:0;">
          カードの象徴を
<b>直感</b>で感じ取る読み方が向いています。
        </p>
      </div>
    </section>
  </div>
</body>
</html>
